  _awardPoint(state, winner, reason = null) {
    if(state.status === 'completed') return;
    AppState.update(s => {
        const game = s.games[s.currentGame]; 
        const now = Date.now(); const prevTime = game.pointLog.length > 0 ? game.pointLog[game.pointLog.length - 1].time : (game.startTime || s.timestamp);
        const rallyDuration = Math.max(0, Math.round((now - prevTime) / 1000));
        
        const logEntry = { winner, scoreA: game.scoreA + (winner === 'A' ? 1 : 0), scoreB: game.scoreB + (winner === 'B' ? 1 : 0), serverName: this._getPlayerName(s, s.currentServer), receiverName: this._getPlayerName(s, s.currentReceiver), serviceCourt: s.serviceCourt, time: now, rallyDuration: rallyDuration, reason: reason };

        const isServerWin = (winner === s.serverSide);
        if (winner === 'A') game.scoreA++; else game.scoreB++;

        if (s.matchType === 'doubles') {
            if (isServerWin) { const pos = s.courtPositions[winner]; const temp = pos.right; pos.right = pos.left; pos.left = temp; } 
            else s.serverSide = winner;
            const servingScore = (winner === 'A') ? game.scoreA : game.scoreB;
            s.serviceCourt = (servingScore % 2 === 0) ? 'Right' : 'Left';
            s.currentServer = s.courtPositions[s.serverSide][s.serviceCourt.toLowerCase()];
            const receivingSide = (winner === 'A') ? 'B' : 'A';
            s.currentReceiver = s.courtPositions[receivingSide][s.serviceCourt.toLowerCase()];
        } else {
            s.serverSide = winner; const servingScore = (winner === 'A') ? game.scoreA : game.scoreB;
            s.serviceCourt = (servingScore % 2 === 0) ? 'Right' : 'Left';
            s.courtPositions[winner][s.serviceCourt.toLowerCase()] = s.sides[winner].players[0].id;
            s.courtPositions[winner][s.serviceCourt.toLowerCase() === 'right' ? 'left' : 'right'] = null;
            const receivingSide = (winner === 'A') ? 'B' : 'A';
            s.courtPositions[receivingSide][s.serviceCourt.toLowerCase()] = s.sides[receivingSide].players[0].id;
            s.courtPositions[receivingSide][s.serviceCourt.toLowerCase() === 'right' ? 'left' : 'right'] = null;
            s.currentServer = s.sides[winner].players[0].id; s.currentReceiver = s.sides[receivingSide].players[0].id;
        }

        game.pointLog.push(logEntry);

        const dp = isDeuce(game.scoreA, game.scoreB, s.settings); let gw = null;
        if (dp) { if (game.scoreA >= s.settings.deuceCap) gw = 'A'; else if (game.scoreB >= s.settings.deuceCap) gw = 'B'; else if (game.scoreA - game.scoreB >= 2) gw = 'A'; else if (game.scoreB - game.scoreA >= 2) gw = 'B'; } 
        else { if (game.scoreA >= s.settings.pointsToWin) gw = 'A'; else if (game.scoreB >= s.settings.pointsToWin) gw = 'B'; }

        if (gw) {
            game.winner = gw; game.completed = true; s.gamesWon[gw]++;
            const needed = Math.ceil(s.bestOf / 2);
            if (s.gamesWon.A >= needed || s.gamesWon.B >= needed) { 
                const mw = s.gamesWon.A >= needed ? 'A' : 'B';
                s.status = 'completed'; s.result = `${s.sides[mw].name} wins match`; 
                setTimeout(() => { if(s.tournamentId && AppState.activeMatchId) { TournamentManager.completeMatch(AppState.activeMatchId, s.sides[mw].id, s.gamesWon.A, s.gamesWon.B, AppState.current); Toast.show('Bracket Updated!'); } }, 100);
            } else { 
                s.currentGame++; s.games.push({ number: s.currentGame + 1, scoreA: 0, scoreB: 0, winner: null, pointLog: [], completed: false, startTime: Date.now() }); 
                s.serverSide = gw; s.serviceCourt = 'Right';
                if (s.matchType === 'singles') {
                    s.courtPositions[s.serverSide].right = s.sides[s.serverSide].players[0].id; s.courtPositions[s.serverSide].left = null;
                    const recSide = s.serverSide === 'A' ? 'B' : 'A';
                    s.courtPositions[recSide].right = s.sides[recSide].players[0].id; s.courtPositions[recSide].left = null;
                }
                s.currentServer = s.courtPositions[s.serverSide].right;
                const rSide = s.serverSide === 'A' ? 'B' : 'A'; s.currentReceiver = s.courtPositions[rSide].right;
            }
        }
    }, `Point ${winner}`); Router.render();
  },
  _callLet(state) {
      if(state.status === 'completed') return;
      AppState.update(s => { s.games[s.currentGame].pointLog.push({ isLet: true, time: Date.now(), reason: 'Let' }); }, 'Call Let');
      Router.render();
  },
  _logEvent(state, msg) {
      if(state.status === 'completed') return;
      AppState.update(s => { s.games[s.currentGame].pointLog.push({ isEvent: true, time: Date.now(), reason: msg }); }, 'Log Event');
      Router.render();
  },
  _stopMatch(state) {
    if(state.status === 'completed') { Router.navigate('tournament'); return; }
    CustomAlert.show('End match and sync score to bracket?', 'confirm', () => {
        AppState.update(s => { s.status = 'completed'; s.result = 'Match Manually Stopped'; }, 'Match Stopped');
        let s = AppState.current;
        if(s.tournamentId && AppState.activeMatchId) {
            let winnerId = null; if (s.gamesWon.A > s.gamesWon.B) winnerId = s.sides.A.id; else if (s.gamesWon.B > s.gamesWon.A) winnerId = s.sides.B.id;
            TournamentManager.completeMatch(AppState.activeMatchId, winnerId, s.gamesWon.A, s.gamesWon.B, s);
        }
        Router.navigate('tournament');
    });
  },
  _bindKeyboard(state) {
    const handler = (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return; const key = e.key.toLowerCase();
      if (key === 'a') this._awardPoint(state, 'A'); else if (key === 'b') this._awardPoint(state, 'B'); else if (key === 'z') { if (AppState.undo()) Router.render(); }
    };
    document.removeEventListener('keydown', this._kbHandler); this._kbHandler = handler; document.addEventListener('keydown', handler);
  }
};

  render(container) {
    const state = AppState.current; 
    if (!state) { container.appendChild(el('div', { style: { display:'flex', alignItems:'center', justifyContent:'center', height:'100vh', background:'#0a0a0f', color:'#fff', fontSize:'3vh', fontFamily:'"Rajdhani", sans-serif', letterSpacing: '2px' } }, ['WAITING FOR LIVE MATCH DATA...'])); return; }

    const game = state.games[state.currentGame]; 
    const board = el('div', { className: 'stadium-layout' });
    const shuttleSVG = `<svg class="stadium-shuttle" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C10.5 2 9 3.5 9 5.5C9 6.8 9.8 8 11 8.4V11.5L7.5 13L3.5 9C3.1 8.6 2.5 8.6 2.1 9C1.7 9.4 1.7 10 2.1 10.4L6 14.5L5.5 18C5.4 18.5 5.8 19 6.3 19L9.5 18.5L12 22L14.5 18.5L17.7 19C18.2 19 18.6 18.5 18.5 18L18 14.5L21.9 10.4C22.3 10 22.3 9.4 21.9 9C21.5 8.6 20.9 8.6 20.5 9L16.5 13L13 11.5V8.4C14.2 8 15 6.8 15 5.5C15 3.5 13.5 2 12 2ZM11 13.5L8.5 14.5L9 17L12 19.5L15 17L15.5 14.5L13 13.5V14C13 14.6 12.6 15 12 15C11.4 15 11 14.6 11 14V13.5Z"/></svg>`;

    const headerA = el('div', { className: 'stadium-header-box' }, [state.sides.A.name]);
    const headerCenter = el('div', { className: 'stadium-header-center' });
    const headerB = el('div', { className: 'stadium-header-box' }, [state.sides.B.name]);
    
    let aCls = 'stadium-score-box team-a'; if(this._lastScoreA !== null && this._lastScoreA !== game.scoreA) aCls += ' pop'; this._lastScoreA = game.scoreA;
    let bCls = 'stadium-score-box team-b'; if(this._lastScoreB !== null && this._lastScoreB !== game.scoreB) bCls += ' pop'; this._lastScoreB = game.scoreB;
    
    const scoreA = el('div', { className: aCls }, [String(game.scoreA)]); if (state.serverSide === 'A') scoreA.innerHTML += shuttleSVG;
    const scoreB = el('div', { className: bCls }, [String(game.scoreB)]); if (state.serverSide === 'B') scoreB.innerHTML += shuttleSVG;

    const centerCol = el('div', { className: 'stadium-center-col' });
    const gamesWrap = el('div', { className: 'stadium-center-games' });
    gamesWrap.appendChild(el('div', { className: 'stadium-game-score' }, [String(state.gamesWon.A)]));
    gamesWrap.appendChild(el('div', { className: 'stadium-game-score' }, [String(state.gamesWon.B)]));
    centerCol.appendChild(gamesWrap);
    
    const infoBox = el('div', { className: 'stadium-center-box', style: { flex: 1, justifyContent: 'center' } });
    let statusText = `Game ${state.currentGame + 1}`; let statusColor = '#fff';
    if (!game.completed) {
        const gpA = game.scoreA === state.settings.pointsToWin - 1 && game.scoreA > game.scoreB;
        const gpB = game.scoreB === state.settings.pointsToWin - 1 && game.scoreB > game.scoreA;
        if (gpA || gpB) {
            const needed = Math.ceil(state.bestOf / 2);
            const isMatchPt = (gpA && state.gamesWon.A === needed - 1) || (gpB && state.gamesWon.B === needed - 1);
            statusText = isMatchPt ? 'MATCH POINT' : 'GAME POINT'; statusColor = isMatchPt ? '#ef5350' : '#66bb6a';
        }
    } else { statusText = 'GAME OVER'; }
    
    infoBox.appendChild(el('div', { style: { fontSize: '2.5vh', fontWeight: '700', color: statusColor, textAlign: 'center', marginBottom: '2vh' } }, [statusText]));
    if(state.serviceCourt) infoBox.appendChild(el('div', { style: { fontSize: '1.8vh', color: '#777' } }, [`Court: ${state.serviceCourt}`]));
    centerCol.appendChild(infoBox);
    
    board.appendChild(headerA); board.appendChild(headerCenter); board.appendChild(headerB);
    board.appendChild(scoreA); board.appendChild(centerCol); board.appendChild(scoreB);

    if (state.status === 'completed' && state.result) {
      board.appendChild(el('div', { className: 'result-banner' }, [ 
          el('div', { className: 'result-text', style: { fontSize: '5vw' } }, [Icons.trophy, ' MATCH CONCLUDED']), 
          el('div', { className: 'result-detail', style: { fontSize: '2.5vw', color: '#fff' } }, [state.result]) 
      ]));
    }
    
    const footer = el('div', { className: 'stadium-footer' }, [state.comment || (state.status === 'completed' ? 'MATCH CONCLUDED' : 'LIVE MATCH')]);
    board.appendChild(footer);

    container.appendChild(board);
    setTimeout(() => { const scores = container.querySelectorAll('.stadium-score-box'); scores.forEach(s => s.classList.remove('pop')); }, 200);
  }
};

/* ═══════════════════════════════════════════════════════════════════════
 * MATCH REPORT EXPORT (SINGLE)
 * ═══════════════════════════════════════════════════════════════════════ */
const BadmintonExport = {
  render(container) {
    const state = AppState.current; if (!state) return;
    const wrap = el('div', { className: 'report-container' });
    
    const noPrintNav = el('div', { className: 'no-print', style: { padding: '20px', textAlign: 'center', background: '#f8fafc', borderBottom: '1px solid #e2e8f0', marginBottom: '20px' } });
    noPrintNav.appendChild(el('button', { className: 'btn btn-primary', onClick: () => window.close() }, ['Close Report']));
    noPrintNav.appendChild(el('button', { className: 'btn btn-success', style: {marginLeft: '10px'}, onClick: () => window.print() }, ['🖨️ Print Report']));
    wrap.appendChild(noPrintNav);
    
    const header = el('div', { className: 'bwf-header' });
    const hLeft = el('div', { className: 'bwf-header-left' });
    hLeft.appendChild(el('h1', {}, ['BWF Match Control Protocol']));
    hLeft.appendChild(el('h2', {}, [`${state.sides.A.name} vs ${state.sides.B.name}`]));
    
    const matchEndTime = state.status === 'completed' ? state.timestamp : Date.now();
    const durationMins = Math.max(1, Math.round((matchEndTime - (state.games[0].pointLog[0]?.time || state.timestamp)) / 60000));
    
    const hRight = el('div', { className: 'bwf-meta' });
    hRight.appendChild(el('span', {}, [`Date: ${new Date(state.timestamp).toLocaleDateString()}`]));
    hRight.appendChild(el('span', {}, [`Match Format: Best of ${state.bestOf}`]));
    hRight.appendChild(el('span', {}, [`Duration: ${durationMins} mins`]));
    if(state.officials) {
        if(state.officials.umpire) hRight.appendChild(el('span', {}, [`Umpire: ${state.officials.umpire}`]));
        if(state.officials.serviceJudge) hRight.appendChild(el('span', {}, [`Service / Line Judge: ${state.officials.serviceJudge}`]));
    }
    if(state.tournamentId) hRight.appendChild(el('span', {}, [`Tournament Match ID: ${state.tournamentMatchId}`]));
    
    header.appendChild(hLeft); header.appendChild(hRight); wrap.appendChild(header);

    const summary = el('div', { className: 'bwf-summary-box' });
    summary.appendChild(el('div', {}, [ el('div', {className:'bwf-stat-lbl'}, ['Match Winner']), el('div', {className:'bwf-stat-val', style:{color:'#2e7d32'}}, [state.result ? state.sides[state.gamesWon.A > state.gamesWon.B ? 'A' : 'B'].shortCode : 'TBD']) ]));
    summary.appendChild(el('div', {}, [ el('div', {className:'bwf-stat-lbl'}, [`${state.sides.A.shortCode} Games`]), el('div', {className:'bwf-stat-val'}, [String(state.gamesWon.A)]) ]));
    summary.appendChild(el('div', {}, [ el('div', {className:'bwf-stat-lbl'}, [`${state.sides.B.shortCode} Games`]), el('div', {className:'bwf-stat-val'}, [String(state.gamesWon.B)]) ]));
    wrap.appendChild(summary);

    state.games.forEach((g, i) => {
      const sec = el('div', { className: 'report-section' });
      sec.appendChild(el('h3', {}, [`Game ${i + 1} — Score: ${g.scoreA} - ${g.scoreB} ` + (g.winner ? `(${state.sides[g.winner].shortCode} won)` : '')]));

      if (g.pointLog.length > 0) {
        let maxRally = 0, minRally = Infinity; let streak = 0, maxStreak = 0, streakPlayer = ''; let currServer = null;
        g.pointLog.forEach(pt => {
            if (pt.rallyDuration !== undefined) { if (pt.rallyDuration > maxRally) maxRally = pt.rallyDuration; if (pt.rallyDuration < minRally && pt.rallyDuration >= 0) minRally = pt.rallyDuration; }
            if (pt.serverName === currServer) { streak++; } else { currServer = pt.serverName; streak = 1; }
            if (streak > maxStreak) { maxStreak = streak; streakPlayer = currServer; }
        });
        if (minRally === Infinity) minRally = 0;

        const statRow = el('div', {style: {display: 'flex', gap: '16px', background: '#f8fafc', padding: '12px', border: '1px solid #eceff1', borderRadius: '8px', marginBottom: '16px', fontSize: '0.85rem', color: '#37474f'}});
        statRow.appendChild(el('div', {style: {flex: 1}}, [el('strong', {}, ['Longest Rally: ']), `${maxRally}s`]));
        statRow.appendChild(el('div', {style: {flex: 1}}, [el('strong', {}, ['Shortest Rally: ']), `${minRally}s`]));
        statRow.appendChild(el('div', {style: {flex: 1}}, [el('strong', {}, ['Longest Serve Streak: ']), `${maxStreak} pts (${streakPlayer})`]));
        sec.appendChild(statRow);

        const table = el('table', { className: 'report-table' });
        table.appendChild(el('thead', {}, [el('tr', {}, [ 
            el('th',{style:{width:'5%'}},['No.']), 
            el('th',{style:{width:'15%'}},['Server']), 
            el('th',{style:{width:'15%'}},['Receiver']), 
            el('th',{style:{width:'10%', textAlign:'center'}},['Court']), 
            el('th',{style:{width:'10%', textAlign:'center'}},['Duration']), 
            el('th',{style:{width:'15%', textAlign:'center'}},[`Score (${state.sides.A.shortCode}-${state.sides.B.shortCode})`]), 
            el('th',{style:{width:'15%'}},['Winner']),
            el('th',{style:{width:'15%'}},['Remarks'])
        ])]));
        const tbody = el('tbody');
        g.pointLog.forEach((pt, pi) => {
          if (pt.isLet || pt.isEvent) {
              tbody.appendChild(el('tr', { style: { background: 'rgba(0,0,0,0.02)' } }, [ el('td',{},[String(pi + 1)]), el('td',{colSpan: 7, style:{fontStyle:'italic', color:'#777'}},[pt.isLet ? 'LET (Replay Point)' : pt.reason]) ]));
              return;
          }
          tbody.appendChild(el('tr', { className: pt.winner ? 'rally-won' : '' }, [ 
              el('td',{},[String(pi + 1)]), 
              el('td',{},[pt.serverName || '—']), 
              el('td',{},[pt.receiverName || '—']), 
              el('td',{style:{textAlign:'center'}},[pt.serviceCourt || '—']), 
              el('td',{style:{textAlign:'center'}},[`${pt.rallyDuration !== undefined ? pt.rallyDuration : '-'}s`]), 
              el('td',{style:{textAlign:'center', fontWeight:'bold', fontSize:'1.1em'}},[`${pt.scoreA} - ${pt.scoreB}`]), 
              el('td',{className: 'highlight'},[state.sides[pt.winner].name]),
              el('td',{style:{color:'#e53935', fontSize:'0.8em', fontWeight:'bold'}},[pt.reason || '—'])
          ]));
        });
        table.appendChild(tbody); sec.appendChild(table);
      } else { sec.appendChild(el('p', {className: 'text-muted'}, ['No rallies recorded for this game.'])); }
      wrap.appendChild(sec);
    });
    container.appendChild(wrap);
  }
};

/* ═══════════════════════════════════════════════════════════════════════
 * TOURNAMENT REPORT (PRINTABLE COMBINED BRACKET/GROUPS)
 * ═══════════════════════════════════════════════════════════════════════ */
const TournamentExport = {
  render(container) {
    let t = window.__HISTORY_DATA;
    if (!t) { TournamentManager.loadLocalFallback(); t = TournamentManager.current; }
    if (!t) return;
    
    const wrap = el('div', { className: 'report-container', style: { maxWidth: '1200px' } });
    
    const noPrintNav = el('div', { className: 'no-print', style: { padding: '20px', textAlign: 'center', background: '#f8fafc', borderBottom: '1px solid #e2e8f0', marginBottom: '20px' } });
    noPrintNav.appendChild(el('button', { className: 'btn btn-primary', onClick: () => window.close() }, ['Close Report']));
    noPrintNav.appendChild(el('button', { className: 'btn btn-success', style: {marginLeft: '10px'}, onClick: () => window.print() }, ['🖨️ Print Report']));
    wrap.appendChild(noPrintNav);

    const header = el('div', { className: 'bwf-header' });
    const hLeft = el('div', { className: 'bwf-header-left' });
    hLeft.appendChild(el('h1', {}, ['OFFICIAL TOURNAMENT REPORT']));
    hLeft.appendChild(el('h2', {}, [t.name || 'Tournament']));
    header.appendChild(hLeft);
    
    const hRight = el('div', { className: 'bwf-meta' });
    hRight.appendChild(el('span', {}, [`FORMAT: ${(t.format||'').replace('_', ' ').toUpperCase()}`]));
    hRight.appendChild(el('span', {}, [`TEAMS: ${t.teams.length}`]));
    hRight.appendChild(el('span', {}, [`DATE GENERATED: ${new Date().toLocaleDateString()}`]));
    header.appendChild(hRight); wrap.appendChild(header);

    // --- Inject Group Stage Tables into Print ---
    if (t.format === 'groups' && t.groups) {
        const groupSec = el('div', { style: { marginBottom: '40px' } });
        groupSec.appendChild(el('h3', {style:{fontFamily:"'Rajdhani', sans-serif", fontSize:'1.5rem', marginBottom:'16px', background:'#1a1a2e', color:'#fff', padding:'8px', borderRadius:'4px'}}, ['GROUP STAGE STANDINGS']));
        
        const gGrid = el('div', { className: 'groups-grid' });
        t.groups.forEach(g => {
            const card = el('div', { className: 'group-card' });
            card.appendChild(el('div', { className: 'group-header' }, [ el('span', {}, [`Group ${g.id}`]), el('span', { className: 'text-xs' }, [`Top ${t.advanceCount} Adv`]) ]));
            const tableWrap = el('div', { className: 'table-wrap' });
            const table = el('table', { className: 'groups-table' });
            table.appendChild(el('thead', {}, [el('tr', {}, [el('th',{},['#']), el('th',{},['Team']), el('th',{},['P']), el('th',{},['W'])])]));
            const tbody = el('tbody');
            g.teams.forEach((tm, i) => {
                const tr = el('tr', { className: i < t.advanceCount ? 'advancing-row' : '' });
                tr.appendChild(el('td', {}, [String(i + 1)])); tr.appendChild(el('td', { style: {fontWeight: '500'} }, [escapeHTML(tm.name)]));
                tr.appendChild(el('td', { className: 'text-muted' }, [String(tm.played)])); tr.appendChild(el('td', { style: {fontWeight: 'bold', color: 'var(--accent-primary)'} }, [String(tm.wins)]));
                tbody.appendChild(tr);
            });
            table.appendChild(tbody); tableWrap.appendChild(table); card.appendChild(tableWrap);
            gGrid.appendChild(card);
        });
        groupSec.appendChild(gGrid);
        wrap.appendChild(groupSec);
    }

    // --- Inject Bracket Diagram into Print ---
    if (t.koMatches && t.koMatches.length > 0) {
        const bracketSec = el('div', { style: { marginBottom: '40px', pageBreakBefore: (t.format === 'groups') ? 'always' : 'auto' } });
        bracketSec.appendChild(el('h3', {style:{fontFamily:"'Rajdhani', sans-serif", fontSize:'1.5rem', marginBottom:'32px', background:'#1a1a2e', color:'#fff', padding:'8px', borderRadius:'4px'}}, ['KNOCKOUT BRACKET']));
        
        const scrollWrap = el('div', { className: 'bracket-wrapper' });
        const bracket = el('div', { className: 'bracket' });
        
        t.koMatches.forEach((round, rIndex) => {
            const isFinal = rIndex === t.koMatches.length - 1;
            const roundName = isFinal ? 'Final' : (rIndex === t.koMatches.length - 2 ? 'Semi-Finals' : `Round ${rIndex + 1}`);
            const bRound = el('div', { className: 'bracket-round' });
            bRound.appendChild(el('div', { className: 'round-title', style:{color: '#000'} }, [roundName]));

            round.forEach(m => {
                const isP1Win = m.winnerId && m.teamAId && m.teamAId === m.winnerId;
                const isP2Win = m.winnerId && m.teamBId && m.teamBId === m.winnerId;
                const kMatch = el('div', { className: 'ko-match' });
                
                if(!isFinal) kMatch.appendChild(el('div', {style:{position:'absolute', left:'-20px', top:'50%', transform:'translateY(-50%)', fontSize:'0.6rem', color:'#000', writingMode:'vertical-rl', textOrientation:'mixed', fontWeight:'bold', letterSpacing:'1px'}}, [`M${m.matchNum}`]));

                const renderTeam = (team, label, isBye) => {
                    if (isBye && !team) return `<span style="color:#777; font-style:italic;">BYE</span>`;
                    if (team) return `<div style="display:flex; flex-direction:column; justify-content:center;"><div style="font-size:0.6rem; color:#777; text-transform:uppercase;">${label||''}</div><div style="font-weight: 600;">${escapeHTML(team.name)}</div></div>`;
                    return `<div style="color:#777; font-style:italic; font-weight:600;">${label || 'TBD'}</div>`;
                };

                const t1Row = el('div', { className: 'ko-team ' + (isP1Win ? 'winner' : '') + (m.isBye ? ' is-bye' : '') });
                t1Row.innerHTML = renderTeam(m.teamA, m.labelA, m.isBye) + (isP1Win ? '<span>🏆</span>' : '');
                kMatch.appendChild(t1Row);

                const t2Row = el('div', { className: 'ko-team ' + (isP2Win ? 'winner' : '') + (m.isBye ? ' is-bye' : '') });
                t2Row.innerHTML = renderTeam(m.teamB, m.labelB, m.isBye) + (isP2Win ? '<span>🏆</span>' : '');
                kMatch.appendChild(t2Row);

                if (m.isBye) kMatch.appendChild(el('div', { className: 'bye-tag', style:{color:'#000', border:'1px solid #ccc'} }, ['BYE']));
                bRound.appendChild(kMatch);
            });
            bracket.appendChild(bRound);
        });
        scrollWrap.appendChild(bracket); bracketSec.appendChild(scrollWrap);
        wrap.appendChild(bracketSec);
    }
    
    // --- Detailed Match Results Log (Pulling from Normalized DB Cache) ---
    let completedMatches = [];
    if (t.groups) t.groups.forEach(g => g.matches.forEach(m => { if(m.status==='completed') completedMatches.push({...m, stage: `Group ${g.id}`}); }));
    if (t.koMatches) t.koMatches.forEach(r => r.forEach(m => { if(m.status==='completed' && !m.isBye) completedMatches.push({...m, stage: m.stage}); }));

    if (completedMatches.length > 0) {
        const resSec = el('div', { style: { marginBottom: '40px', pageBreakBefore: 'always' } });
        resSec.appendChild(el('h3', {style:{fontFamily:"'Rajdhani', sans-serif", fontSize:'1.5rem', marginBottom:'20px', background:'#1a1a2e', color:'#fff', padding:'8px', borderRadius:'4px'}}, ['DETAILED MATCH RESULTS']));
        
        completedMatches.forEach(m => {
            const mWrap = el('div', { className: 'card', style: { marginBottom: '16px', padding: '16px', border: '1px solid #ccc', breakInside: 'avoid' } });
            
            const mHead = el('div', { style: { display: 'flex', justifyContent: 'space-between', borderBottom: '2px solid #eee', paddingBottom: '8px', marginBottom: '12px' } });
            mHead.appendChild(el('div', { style: { fontWeight: 'bold', fontSize: '1.1rem' } }, [`${m.stage}: ${m.teamA?.name || 'TBA'} vs ${m.teamB?.name || 'TBA'}`]));
            
            const wName = m.winnerId === m.teamAId ? m.teamA?.name : (m.winnerId === m.teamBId ? m.teamB?.name : 'Unknown');
            mHead.appendChild(el('div', { style: { color: '#2e7d32', fontWeight: 'bold' } }, [`Winner: ${wName} (${m.scoreA} - ${m.scoreB})`]));
            mWrap.appendChild(mHead);

            // Fetch detail from the mapped memory cache populated during sync/load
            const fullState = window.__HISTORY_DETAILS_MAP ? window.__HISTORY_DETAILS_MAP[m.id] : m.fullState;

            if (fullState && fullState.games) {
                fullState.games.forEach((g, i) => {
                    const gWrap = el('div', { style: { marginTop: '16px', borderTop: '1px solid #eee', paddingTop: '16px' } });
                    gWrap.appendChild(el('div', { style: { fontWeight: 'bold', marginBottom: '8px', color: '#1a73e8' } }, [`Game ${i + 1} — Score: ${g.scoreA} - ${g.scoreB}`]));

                    if (g.pointLog && g.pointLog.length > 0) {
                        const table = el('table', { className: 'report-table', style: { margin: 0, fontSize: '0.8rem' } });
                        table.appendChild(el('thead', {}, [el('tr', {}, [ 
                            el('th',{style:{width:'5%'}},['No.']), 
                            el('th',{style:{width:'15%'}},['Server']), 
                            el('th',{style:{width:'15%'}},['Receiver']), 
                            el('th',{style:{width:'10%', textAlign:'center'}},['Court']), 
                            el('th',{style:{width:'10%', textAlign:'center'}},['Duration']), 
                            el('th',{style:{width:'15%', textAlign:'center'}},[`Score`]), 
                            el('th',{style:{width:'15%'}},['Winner']),
                            el('th',{style:{width:'15%'}},['Remarks'])
                        ])]));
                        const tbody = el('tbody');
                        g.pointLog.forEach((pt, pi) => {
                          if (pt.isLet || pt.isEvent) {
                              tbody.appendChild(el('tr', { style: { background: 'rgba(0,0,0,0.02)' } }, [ el('td',{},[String(pi + 1)]), el('td',{colSpan: 7, style:{fontStyle:'italic', color:'#777'}},[pt.isLet ? 'LET (Replay Point)' : pt.reason]) ]));
                              return;
                          }
                          tbody.appendChild(el('tr', { className: pt.winner ? 'rally-won' : '' }, [ 
                              el('td',{},[String(pi + 1)]), 
                              el('td',{},[pt.serverName || '—']), 
                              el('td',{},[pt.receiverName || '—']), 
                              el('td',{style:{textAlign:'center'}},[pt.serviceCourt || '—']), 
                              el('td',{style:{textAlign:'center'}},[`${pt.rallyDuration !== undefined ? pt.rallyDuration : '-'}s`]), 
                              el('td',{style:{textAlign:'center', fontWeight:'bold', fontSize:'1.1em'}},[`${pt.scoreA} - ${pt.scoreB}`]), 
                              el('td',{className: 'highlight'},[fullState.sides[pt.winner].name]),
                              el('td',{style:{color:'#e53935', fontSize:'0.8em', fontWeight:'bold'}},[pt.reason || '—'])
                          ]));
                        });
                        table.appendChild(tbody); gWrap.appendChild(table);
                    } else {
                        gWrap.appendChild(el('div', { style: { color: '#78909c', fontSize: '0.85rem', fontStyle: 'italic' } }, ['No rally details for this game.']));
                    }
                    mWrap.appendChild(gWrap);
                });
            } else {
                mWrap.appendChild(el('div', { style: { color: '#78909c', fontSize: '0.9rem', fontStyle: 'italic', marginTop: '10px' } }, ['Match simulated manually (No point-by-point timeline available).']));
            }
            resSec.appendChild(mWrap);
        });
        wrap.appendChild(resSec);
    }
    
    container.appendChild(wrap);
  }
};

if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => { Router.init(); window.addEventListener('popstate', () => Router.init()); });
} else { Router.init(); window.addEventListener('popstate', () => Router.init()); }
