      const grid = el('div', { id:'schedule-grid', style: { display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(320px, 1fr))', gap: '14px' } });

      allMatches.forEach(m => {
          const mSel = el('div', { className: 'match-selector', style: {height: '100%', display: 'flex', flexDirection: 'column', position: 'relative', border: '1px solid var(--border-color)', borderRadius: 'var(--radius-sm)'} });
          
          // ─── FIXTURE HEADER BLOCK ───
          const headerBlock = el('div', {style:{background:'rgba(0,0,0,0.3)', padding:'8px 12px', borderBottom:'1px solid var(--border-color)'}});

          if (canEditFixtures) {
              // Row 1: Stage dropdown + Match# badge
              const row1 = el('div', {style:{display:'flex', alignItems:'center', gap:'8px', marginBottom:'6px'}});
              
              const stageSelect = el('select', {
                  style:{flex:1, padding:'4px 8px', fontSize:'0.75rem', fontWeight:'bold', background:'rgba(0,0,0,0.4)', color:'var(--accent-primary)', border:'1px solid rgba(79,195,247,0.3)', borderRadius:'4px'},
                  onChange: (e) => {
                      const match = TournamentManager._findMatch(m.id);
                      if (match) { match.stage = e.target.value; TournamentManager.save(); if(window.FBM.user){const fm={...match};delete fm.teamA;delete fm.teamB;window.FBM.saveMatchMeta(fm);} window.Router.render(); }
                  }
              });
              // Group stages — with Round sub-options
              if (groupNames.length) {
                  const grpGroup = el('optgroup', {label: 'Group Stage'});
                  groupNames.forEach(gId => {
                      [1,2,3].forEach(rnd => {
                          const val = `Group ${gId} (Round ${rnd})`;
                          grpGroup.appendChild(el('option', {value: val, ...(m.stage === val ? {selected:''} : {})}, [val]));
                      });
                  });
                  stageSelect.appendChild(grpGroup);
              }
              // KO rounds
              if (koRounds.length) {
                  const koGroup = el('optgroup', {label: 'Knockout'});
                  koRounds.forEach(rName => { koGroup.appendChild(el('option', {value: rName, ...(m.stage === rName ? {selected:''} : {})}, [rName])); });
                  stageSelect.appendChild(koGroup);
              }
              row1.appendChild(el('span', {style:{fontSize:'0.7rem', color:'var(--text-muted)', fontWeight:'bold', whiteSpace:'nowrap'}}, ['Stage:']));
              row1.appendChild(stageSelect);
              row1.appendChild(el('span', {style:{color:'var(--text-muted)', fontSize:'0.75rem', fontWeight:'bold', whiteSpace:'nowrap'}}, [`M#${m.matchNum}`]));
              headerBlock.appendChild(row1);

              // Row 2: Court # + Round # dropdowns
              const row2 = el('div', {style:{display:'flex', alignItems:'center', gap:'8px'}});

              // Court number dropdown
              const courtSelect = el('select', {
                  style:{flex:1, padding:'4px 8px', fontSize:'0.75rem', background:'rgba(0,0,0,0.4)', color:'#fff', border:'1px solid var(--border-color)', borderRadius:'4px'},
                  onChange: (e) => {
                      const match = TournamentManager._findMatch(m.id);
                      if (match) { match.court = e.target.value; TournamentManager.save(); if(window.FBM.user){const fm={...match};delete fm.teamA;delete fm.teamB;window.FBM.saveMatchMeta(fm);} window.Router.render(); }
                  }
              });
              courtSelect.appendChild(el('option', {value:''}, ['Court —']));
              for (let c = 1; c <= 12; c++) courtSelect.appendChild(el('option', {value: String(c), ...((m.court === String(c)) ? {selected:''} : {})}, [`Court ${c}`]));
              
              // Match number editable input
              const matchNumInput = el('input', {
                  type: 'number', min: '1', value: String(m.matchNum),
                  style:{flex:1, padding:'4px 8px', fontSize:'0.75rem', background:'rgba(0,0,0,0.4)', color:'#fff', border:'1px solid var(--border-color)', borderRadius:'4px', textAlign:'center'},
                  onChange: (e) => {
                      const val = parseInt(e.target.value);
                      if (!val || val < 1) return;
                      const match = TournamentManager._findMatch(m.id);
                      if (match) { match.matchNum = val; TournamentManager.save(); if(window.FBM.user){const fm={...match};delete fm.teamA;delete fm.teamB;window.FBM.saveMatchMeta(fm);} window.Router.render(); }
                  }
              });

              row2.appendChild(el('span', {style:{fontSize:'0.7rem', color:'var(--text-muted)', fontWeight:'bold', whiteSpace:'nowrap'}}, ['Court:']));
              row2.appendChild(courtSelect);
              row2.appendChild(el('span', {style:{fontSize:'0.7rem', color:'var(--text-muted)', fontWeight:'bold', whiteSpace:'nowrap'}}, ['M#:']));
              row2.appendChild(matchNumInput);
              headerBlock.appendChild(row2);

              // Row 3: Scheduled time (if set)
              if (m.scheduledTime) {
                  const timeRow = el('div', {style:{marginTop:'4px', fontSize:'0.72rem', color:'var(--accent-warning)', fontWeight:'bold'}});
                  timeRow.textContent = `⏰ ${m.scheduledTime}`;
                  headerBlock.appendChild(timeRow);
              }
          } else {
              // Spectator / umpire read-only header
              const readRow = el('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'center'}});
              readRow.appendChild(el('span', {style:{color:'var(--accent-primary)', fontSize:'0.75rem', fontWeight:'bold', textTransform:'uppercase'}}, [m.stage || '']));
              const rightInfo = el('div', {style:{display:'flex', gap:'8px', alignItems:'center'}});
              if (m.court) rightInfo.appendChild(el('span', {style:{background:'rgba(255,202,40,0.15)', color:'var(--accent-warning)', fontSize:'0.7rem', fontWeight:'bold', padding:'2px 7px', borderRadius:'4px'}}, [`Court ${m.court}`]));
              rightInfo.appendChild(el('span', {style:{color:'var(--text-muted)', fontSize:'0.75rem', fontWeight:'bold'}}, [`M${m.matchNum}`]));
              readRow.appendChild(rightInfo);
              headerBlock.appendChild(readRow);
              if (m.scheduledTime) headerBlock.appendChild(el('div', {style:{fontSize:'0.7rem', color:'var(--accent-warning)', marginTop:'3px', fontWeight:'bold'}}, [`⏰ ${m.scheduledTime}`]));
          }

          mSel.appendChild(headerBlock);

          const teamWrap = el('div', { style: {flex: 1} });
          
          const makeTeamRow = (teamId, slotKey) => {
              const isWin = m.winnerId && teamId && m.winnerId === teamId;
              const teamObj = t.teams.find(tm => tm.id === teamId);
              const div = el('div', { className: 'match-team' + (isWin ? ' winner' : ''), style: {padding: '12px 16px', display: 'flex', justifyContent: 'space-between', alignItems: 'center'} });
              
              if (canEditFixtures && m.status === 'pending') {
                  const sel = el('select', { 
                      className: 'team-dropdown no-print',
                      onChange: (e) => TournamentManager.updateMatchTeam(m.id, slotKey, e.target.value)
                  });
                  sel.appendChild(el('option', { value: '' }, ['TBD']));
                  t.teams.forEach(tm => {
                      sel.appendChild(el('option', { value: tm.id, ...(tm.id === teamId ? {selected:''} : {}) }, [escapeHTML(tm.name)]));
                  });
                  div.appendChild(sel);
                  
                  const fallbackLabel = slotKey === 'teamAId' ? m.labelA : m.labelB;
                  const printName = teamObj ? escapeHTML(teamObj.name) : (fallbackLabel || 'TBD');
                  const printLabel = el('span', { className: 'print-only', style: { fontSize: '1rem', fontWeight: '700' } }, [printName]);
                  div.appendChild(printLabel);
                  
                  if (teamId) {
                      const winBtn = el('button', { className: 'btn btn-ghost btn-sm no-print', style: {padding: '4px 10px', fontSize: '0.75rem', color: 'var(--accent-success)', fontWeight:'bold'}, onClick: () => TournamentManager.simulateWin(m.id, teamId) }, ['Win']);
                      div.appendChild(winBtn);
                  }
              } else {
                  let nameSpan = '';
                  if(teamObj) {
                      nameSpan = `<a style="font-weight:700; cursor:pointer;" onclick="window.showTeamStats('${teamObj.id}')">${escapeHTML(teamObj.name)}</a>`;
                  } else {
                      nameSpan = `<span style="font-weight:700; color:var(--text-muted);">TBD</span>`;
                  }
                  div.innerHTML = `<div style="font-size:1rem;">${nameSpan}</div>`;
                  if (isWin) div.appendChild(el('span', {style:{fontSize:'1.2rem'}}, ['🏆']));
              }
              
              return div;
          };

          teamWrap.appendChild(makeTeamRow(m.teamAId, 'teamAId'));
          teamWrap.appendChild(makeTeamRow(m.teamBId, 'teamBId'));
          mSel.appendChild(teamWrap);
          
          const actionsRow = el('div', { className: 'no-print', style: { padding: '12px 16px', textAlign: 'center', background: 'rgba(0,0,0,0.3)', marginTop: 'auto', borderTop:'1px solid var(--border-color)' } });

          if (isSpectator) {
              // Umpire sessions always get Start/Resume — no permission gate
              const isUmpireSession = !!localStorage.getItem('UMPIRE_SESSION_ID');
              const canViewLive = umpirePerms.canViewLiveMatch !== false;

              if (m.status === 'completed') {
                  actionsRow.appendChild(el('span', {className:'text-xs', style:{color: 'var(--accent-success)', fontWeight:'bold'}}, ['MATCH COMPLETED ✓']));
              } else if (m.status === 'live') {
                  if (isUmpireSession) {
                      actionsRow.appendChild(el('button', { className: 'btn btn-warning btn-sm w-full', style:{fontSize:'0.85rem',padding:'8px 12px',fontWeight:'bold'}, onClick: () => this._playTournamentMatch(m.id) }, ['🔴 RESUME & SCORE MATCH']));
                  } else if (canViewLive) {
                      actionsRow.appendChild(el('button', { className: 'btn btn-primary btn-sm w-full', style: {fontSize: '0.85rem', padding: '8px 12px'}, onClick: () => DisplayManager.launchScoreboard(m.id) }, ['📺 View Live Match']));
                  } else {
                      actionsRow.appendChild(el('span', {className:'text-xs text-muted font-bold'}, ['LIVE']));
                  }
              } else if (m.status === 'pending' && m.teamAId && m.teamBId) {
                  if (isUmpireSession) {
                      actionsRow.appendChild(el('button', { className: 'btn btn-success btn-sm w-full', style:{fontSize:'0.85rem',padding:'8px 12px',fontWeight:'800',letterSpacing:'0.04em'}, onClick: () => this._playTournamentMatch(m.id) }, ['🎙️ START MATCH']));
                  } else {
                      actionsRow.appendChild(el('span', {className:'text-xs', style:{color:'var(--accent-warning)',fontWeight:'700'}}, [m.scheduledTime ? `⏰ ${m.scheduledTime}` : 'UPCOMING']));
                  }
              } else {
                  actionsRow.appendChild(el('span', {className:'text-xs text-muted font-bold'}, ['PENDING TEAMS']));
              }
          } else {
              if (m.status === 'completed') {
                  actionsRow.style.display = 'flex';
                  actionsRow.style.justifyContent = 'space-between';
                  actionsRow.style.alignItems = 'center';
                  actionsRow.appendChild(el('span', {className:'text-xs', style:{color: 'var(--accent-success)', fontWeight:'bold'}}, ['MATCH COMPLETED ✓']));
                  actionsRow.appendChild(el('button', { className: 'btn btn-ghost btn-sm no-print', onClick: () => TournamentManager.clearMatchResult(m.id) }, ['↩️ Undo/Clear']));
              } else if (m.status === 'live') {
                  actionsRow.appendChild(el('button', { className: 'btn btn-warning btn-sm w-full', style: {fontSize: '0.85rem', padding: '8px 12px', fontWeight:'bold'}, onClick: () => this._playTournamentMatch(m.id) }, ['🔴 RESUME LIVE']));
              } else {
                  if (!m.teamAId || !m.teamBId) {
                      actionsRow.appendChild(el('span', {className:'text-xs text-muted font-bold'}, ['PENDING TEAMS']));
                  } else {
                      actionsRow.appendChild(el('button', { className: 'btn btn-primary btn-sm w-full', style: {fontSize: '0.85rem', padding: '8px 12px'}, onClick: () => this._playTournamentMatch(m.id) }, ['▶ START MATCH']));
                  }
              }
          }
          
          mSel.appendChild(actionsRow);
          grid.appendChild(mSel);
      });

      containerCard.appendChild(grid);
      wrap.appendChild(containerCard);
      return wrap;
  },

  /* --- GROUPS STAGES VISUALS (STANDINGS + SPECIFIC MATCHES) --- */
  _renderGroupsTab(t, isSpectator) {
      TournamentManager._updateStandings();
      const wrap = el('div', { className: 'w-full' });
      
      const actions = el('div', { className: 'flex justify-end mb-md no-print' });
      if (!isSpectator && t.phase === 'rr') {
          actions.appendChild(el('button', { className: 'btn btn-success', onClick: () => {
              let incomplete = 0; t.groups.forEach(g => g.matches.forEach(m => { if (!m.winnerId) incomplete++; }));
              if (incomplete > 0) CustomAlert.show(`There are ${incomplete} matches without a result. Generating knockouts will use current standings. Proceed?`, 'confirm', () => { TournamentManager.transitionToKnockout(); this.activeTab = 'bracket'; window.Router.render(); });
              else { TournamentManager.transitionToKnockout(); this.activeTab = 'bracket'; window.Router.render(); }
          } }, ['Finalize Groups & Generate Knockouts ➔']));
          wrap.appendChild(actions);
      }

      const grid = el('div', { className: 'groups-grid' });
      t.groups.forEach(g => {
          const card = el('div', { className: 'group-card' });
          card.appendChild(el('div', { className: 'group-header' }, [
              el('span', {}, [`Group ${g.id}`]),
              el('span', { className: 'text-xs', style: {background:'rgba(255,255,255,0.2)', padding:'2px 6px', borderRadius:'4px'} }, [`Top ${t.advanceCount} Adv`])
          ]));
          
          const tableWrap = el('div', { className: 'table-wrap', style: {borderBottom: 'none'} });
          const table = el('table', { className: 'groups-table' });
          table.appendChild(el('thead', {}, [el('tr', {}, [
              el('th',{style:{width:'32px',textAlign:'center'}},['#']),
              el('th',{},['Team']),
              el('th',{style:{textAlign:'center'},title:'Matches Played'},['Played']),
              el('th',{style:{textAlign:'center', color:'var(--accent-primary)'},title:'Matches Won'},['Won'])
          ])]));
          const tbody = el('tbody');
          g.teams.forEach((tm, i) => {
              const tr = el('tr', { className: i < t.advanceCount ? 'advancing-row' : '' });
              tr.appendChild(el('td', {style:{fontWeight:'bold'}}, [String(i + 1)]));
              
              const teamTd = el('td', { style: {fontWeight: '700'} });
              if (!isSpectator && t.phase === 'rr') {
                  const selWrap = el('div', { className: 'flex items-center gap-xs' });
                  const sel = el('select', { 
                      className: 'team-dropdown no-print',
                      style: { width: '100%', minWidth: '120px', maxWidth: '100%', padding: '4px 8px', fontSize: '0.9rem', backgroundColor: 'rgba(0,0,0,0.5)', border: '1px solid var(--border-color)', borderRadius: '4px' },
                      onChange: (e) => {
                          const newTeamId = e.target.value;
                          if (newTeamId && newTeamId !== tm.id) {
                              CustomAlert.show(`Swap ${tm.name} with this team? All their group matches will be swapped.`, 'confirm', () => {
                                  TournamentManager.swapTeamsGlobally(tm.id, newTeamId);
                              });
                              e.target.value = tm.id; // Reset back immediately; will be updated if confirmed
                          }
                      }
                  });
                  t.teams.forEach(allTm => {
                      sel.appendChild(el('option', { value: allTm.id, ...(allTm.id === tm.id ? {selected:''} : {}) }, [escapeHTML(allTm.name)]));
                  });
                  selWrap.appendChild(sel);
                  teamTd.appendChild(selWrap);
                  
                  // Print only span
                  teamTd.appendChild(el('span', { className: 'print-only' }, [escapeHTML(tm.name)]));
              } else {
                  teamTd.appendChild(el('a', {onClick: () => window.showTeamStats(tm.id)}, [escapeHTML(tm.name)]));
              }
              tr.appendChild(teamTd);

              tr.appendChild(el('td', { style: {textAlign:'center', color:'var(--text-muted)', fontWeight:'700'} }, [String(tm.played)]));
              tr.appendChild(el('td', { style: {textAlign:'center', fontWeight:'900', color:'var(--accent-success)', fontSize:'1.05rem'} }, [String(tm.wins)]));
              tbody.appendChild(tr);
          });
          table.appendChild(tbody); tableWrap.appendChild(table); card.appendChild(tableWrap);
          
          // Match List for this specific group — enhanced with M#, time, court
          const matchesDiv = el('div', { className: 'match-list', style: {borderTop:'1px solid var(--border-color)', padding: '16px'} });
          matchesDiv.appendChild(el('div', {style:{fontSize:'0.85rem', fontWeight:'bold', textTransform:'uppercase', color:'var(--text-secondary)', marginBottom:'12px', textAlign:'center', letterSpacing:'1px'}}, [`Group ${g.id} — Matches`]));

          // Group by round
          const rounds = {};
          g.matches.forEach(m => {
              const rNum = m.roundNum || (m.stage && m.stage.match(/Round\s*(\d+)/i) ? parseInt(m.stage.match(/Round\s*(\d+)/i)[1]) : 1);
              if (!rounds[rNum]) rounds[rNum] = [];
              rounds[rNum].push(m);
          });

          Object.keys(rounds).sort((a,b)=>a-b).forEach(rNum => {
              const rHeader = el('div', {style:{fontSize:'0.72rem', fontWeight:'700', textTransform:'uppercase', color:'var(--accent-primary)', letterSpacing:'1px', marginBottom:'6px', marginTop: rNum > 1 ? '12px' : '0'}}, [`Round ${rNum}`]);
              matchesDiv.appendChild(rHeader);

              rounds[rNum].forEach(m => {
                  const mSel = el('div', { className: 'match-selector', style: {marginBottom: '8px'} });

                  // Mini header: M# + court + time
                  const mHdr = el('div', {style:{background:'rgba(0,0,0,0.3)', padding:'4px 10px', display:'flex', justifyContent:'space-between', alignItems:'center', fontSize:'0.7rem', borderBottom:'1px solid var(--border-color)'}});
                  const leftInfo = el('div', {style:{display:'flex', gap:'8px', alignItems:'center'}});
                  leftInfo.appendChild(el('span', {style:{color:'var(--text-muted)', fontWeight:'bold'}}, [`M${m.matchNum}`]));
                  if (m.court) leftInfo.appendChild(el('span', {style:{background:'rgba(255,202,40,0.15)', color:'var(--accent-warning)', padding:'1px 6px', borderRadius:'3px', fontWeight:'bold'}}, [`Court ${m.court}`]));
                  mHdr.appendChild(leftInfo);
                  if (m.scheduledTime) mHdr.appendChild(el('span', {style:{color:'var(--accent-warning)', fontWeight:'bold'}}, [`⏰ ${m.scheduledTime}`]));
                  mSel.appendChild(mHdr);

                  const makeTeamRow = (teamObj) => {
                      const isWin = m.winnerId && teamObj && m.winnerId === teamObj.id;
                      const div = el('div', { className: 'match-team' + (isWin ? ' winner' : ''), style: {padding: '8px 12px', display:'flex', justifyContent:'space-between', alignItems:'center'} });
                      let nameSpan = '';
                      if(teamObj) {
                          nameSpan = `<a style="font-weight:700; cursor:pointer;" onclick="window.showTeamStats('${teamObj.id}')">${escapeHTML(teamObj.name)}</a>`;
                      } else {
                          nameSpan = `<span style="font-weight:700; color:var(--text-muted);">TBD</span>`;
                      }
                      div.innerHTML = `<span style="font-size:0.95rem;">${nameSpan}</span>`;
                      if (isWin) {
                          div.appendChild(el('span', {style:{fontSize:'1.1rem'}}, ['🏆']));
                          if (!isSpectator) {
                              const undoBtn = el('button', { className: 'btn btn-ghost btn-sm no-print', style: {padding: '3px 8px', fontSize: '0.7rem', marginLeft: '8px'}, onClick: (e) => { e.stopPropagation(); TournamentManager.clearMatchResult(m.id); } }, ['↩️']);
                              div.appendChild(undoBtn);
                          }
                      } else if (!isSpectator && m.status === 'pending' && teamObj) {
                          const winBtn = el('button', { className: 'btn btn-ghost btn-sm no-print', style: {padding: '3px 8px', fontSize: '0.7rem', color: 'var(--accent-success)', fontWeight:'bold'}, onClick: () => TournamentManager.simulateWin(m.id, teamObj.id) }, ['Win']);
                          div.appendChild(winBtn);
                      }
                      return div;
                  };
                  mSel.appendChild(makeTeamRow(m.teamA));
                  mSel.appendChild(makeTeamRow(m.teamB));

                  // Action row — umpire always gets Start/Resume, no scheduling gate
                  const _isUmpGrp = isSpectator && !!localStorage.getItem('UMPIRE_SESSION_ID');
                  if (m.status === 'pending' && m.teamAId && m.teamBId && (!isSpectator || _isUmpGrp)) {
                      const actRow = el('div', {style:{padding:'6px 10px', textAlign:'center', background:'rgba(0,0,0,0.2)', borderTop:'1px solid var(--border-color)'}});
                      const btnLabel = _isUmpGrp ? '🎙️ Start Match' : '▶ Start Match';
                      const btnClass = _isUmpGrp ? 'btn btn-success btn-sm w-full no-print' : 'btn btn-primary btn-sm w-full no-print';
                      actRow.appendChild(el('button', {className: btnClass, style:{fontSize:'0.78rem', padding:'5px 10px', minHeight:'auto', fontWeight:'800'}, onClick: () => window.TournamentHub._playTournamentMatch(m.id)}, [btnLabel]));
                      mSel.appendChild(actRow);
                  } else if (m.status === 'live') {
                      const actRow = el('div', {style:{padding:'6px 10px', textAlign:'center', background:'rgba(0,0,0,0.2)', borderTop:'1px solid var(--border-color)'}});
                      if (!isSpectator || _isUmpGrp) {
                          actRow.appendChild(el('button', {className:'btn btn-warning btn-sm w-full no-print', style:{fontSize:'0.78rem', padding:'5px 10px', minHeight:'auto', fontWeight:'bold'}, onClick: () => window.TournamentHub._playTournamentMatch(m.id)}, ['🔴 Resume Live']));
                      } else if (umpirePerms.canViewLiveMatch !== false) {
                          actRow.appendChild(el('button', {className:'btn btn-primary btn-sm w-full no-print', style:{fontSize:'0.78rem', padding:'5px 10px', minHeight:'auto'}, onClick: () => DisplayManager.launchScoreboard(m.id)}, ['📺 Watch Live']));
                      }
                      mSel.appendChild(actRow);
                  }
                  matchesDiv.appendChild(mSel);
              });
          });

          card.appendChild(matchesDiv);
          grid.appendChild(card);
      });
      wrap.appendChild(grid);
      return wrap;
  },

  /* --- KNOCKOUT BRACKET (WITH DRAG & DROP) --- */
  _renderBracket(t, isSpectator) {
      const wrap = el('div', { className: 'w-full' });
      const rounds = t.koMatches;
      if(!rounds || rounds.length === 0) { wrap.appendChild(el('div', {className: 'text-muted p-lg text-center card', style:{fontWeight:'bold'}}, ['Knockout bracket will appear here once the Group Stage is finalized.'])); return wrap; }
      
      const isInitialRound = (rIndex) => rIndex === 0;
      const canDrag = !isSpectator && t.phase === 'ko' && rounds[0].every(m => m.status === 'pending' || m.isBye);

      // ADDED PRINT BRACKET BUTTON AT THE TOP OF THE TAB
      const headerActions = el('div', {className: 'flex justify-end mb-md no-print'});
      headerActions.appendChild(el('button', { className: 'btn btn-primary btn-sm', onClick: () => window.print() }, ['🖨️ Print Bracket (PDF)']));
      wrap.appendChild(headerActions);

      const getTeamDisplay = (team, label, isBye) => {
          if (isBye && !team) return `<span style="color:var(--text-muted); font-style:italic;">BYE</span>`;
          const labelHtml = label ? `<div style="font-size:0.7rem; color:var(--text-muted); text-transform:uppercase; line-height:1.2; margin-bottom:4px; font-weight:700;">${label}</div>` : '';
          if (team) { return `<div style="display:flex; flex-direction:column; justify-content:center;">${labelHtml}<a style="font-weight: 700; color:var(--text-primary); font-size:1rem;">${escapeHTML(team.name)}</a></div>`; } 
          else { return `<div style="display:flex; flex-direction:column; justify-content:center;"><div style="color:var(--text-muted); font-style:italic; font-size: 0.9rem; font-weight:700;">${label || 'TBD'}</div></div>`; }
      };

      const scrollWrap = el('div', { className: 'bracket-wrapper' });
      
      if (canDrag) {
          const helper = el('div', {className: 'no-print', style:{background:'rgba(255,202,40,0.1)', color:'var(--accent-warning)', padding:'12px', borderRadius:'8px', marginBottom:'16px', border:'1px solid var(--accent-warning)', fontSize:'0.85rem', textAlign:'center'}});
          helper.innerHTML = `<strong>Admin Mode:</strong> The bracket is unlocked. You can drag and drop teams in Round 1 to manually swap their seeds before matches start.`;
          scrollWrap.appendChild(helper);
      }

      const bracket = el('div', { className: 'bracket' });
      
      rounds.forEach((round, rIndex) => {
          const isFinal = rIndex === rounds.length - 1;
          const roundName = isFinal ? 'Final' : (rIndex === rounds.length - 2 ? 'Semi-Finals' : `Round ${rIndex + 1}`);
          const bRound = el('div', { className: 'bracket-round' });
          bRound.appendChild(el('div', { className: 'round-title' }, [roundName]));

          round.forEach(m => {

  _playTournamentMatch(matchId) {
      const t = TournamentManager.current; const match = TournamentManager._findMatch(matchId);
      if(!match || !match.teamA || !match.teamB) { CustomAlert.show('Match invalid or teams TBD', 'error'); return; }

      const overlay = el('div', { className: 'modal-overlay' }); 
      const modal = el('div', { className: 'modal', style: { maxWidth: '500px' } });
      modal.appendChild(el('div', { className: 'modal-title' }, [Icons.badminton, ' Pre-Match Toss']));
      
      const c = t.settings;
      let selectedWinner = 'A'; let selectedDecision = 'serve';
      let serverId = match.teamA.players[0].id; let receiverId = match.teamB.players[0].id;
      let umpireName = ''; let serviceJudgeName = '';

      const refreshModal = () => {
          const content = el('div', { id: 'toss-content' });
          content.appendChild(UIUtils.segmentedControl('Toss Winner', [{label:match.teamA.name, val:'A'}, {label:match.teamB.name, val:'B'}], selectedWinner, v => { selectedWinner = v; renderContent(); }));
          content.appendChild(UIUtils.segmentedControl('Decision', [{label:'Serve First', val:'serve'}, {label:'Receive First', val:'receive'}], selectedDecision, v => { selectedDecision = v; renderContent(); }));

          const servingSide = selectedDecision === 'serve' ? selectedWinner : (selectedWinner === 'A' ? 'B' : 'A');
          const receivingSide = servingSide === 'A' ? 'B' : 'A';
          const servingTeam = servingSide === 'A' ? match.teamA : match.teamB;
          const receivingTeam = receivingSide === 'A' ? match.teamA : match.teamB;

          const serverGroup = el('div', {className: 'form-group mt-md'});
          serverGroup.appendChild(el('label', {className: 'form-label'}, [`Starting Server (${servingTeam.name})`]));
          const serverSelect = el('select', {onChange: e => serverId = e.target.value});
          servingTeam.players.forEach(p => { serverSelect.appendChild(el('option', {value: p.id, ...(serverId === p.id ? {selected:''} : {})}, [p.name])); });
          serverGroup.appendChild(serverSelect); content.appendChild(serverGroup);

          const receiverGroup = el('div', {className: 'form-group mt-sm'});
          receiverGroup.appendChild(el('label', {className: 'form-label'}, [`Starting Receiver (${receivingTeam.name})`]));
          const receiverSelect = el('select', {onChange: e => receiverId = e.target.value});
          receivingTeam.players.forEach(p => { receiverSelect.appendChild(el('option', {value: p.id, ...(receiverId === p.id ? {selected:''} : {})}, [p.name])); });
          receiverGroup.appendChild(receiverSelect); content.appendChild(receiverGroup);
          
          const offGroup = el('div', {className: 'form-group mt-md', style: {borderTop: '1px solid var(--border-color)', paddingTop: '16px'}});
          offGroup.appendChild(el('label', {className: 'form-label'}, ['Match Officials (Optional)']));
          const umpInp = el('input', {type: 'text', placeholder: 'Umpire Name', value: umpireName, style: {marginBottom: '8px'}});
          umpInp.addEventListener('input', e => umpireName = e.target.value);
          const sjInp = el('input', {type: 'text', placeholder: 'Service / Line Judge', value: serviceJudgeName});
          sjInp.addEventListener('input', e => serviceJudgeName = e.target.value);
          offGroup.appendChild(umpInp); offGroup.appendChild(sjInp); content.appendChild(offGroup);

          const existing = modal.querySelector('#toss-content');
          if (existing) existing.replaceWith(content); else modal.insertBefore(content, modal.querySelector('.form-row'));
      };
      const renderContent = () => refreshModal(); renderContent();

      const actions = el('div', { className: 'form-row mt-lg', style: { justifyContent: 'flex-end' } });
      actions.appendChild(el('button', { className: 'btn btn-ghost', onClick: () => overlay.remove() }, ['Cancel']));
      actions.appendChild(el('button', { className: 'btn btn-success', onClick: () => { 
          const servingSide = selectedDecision === 'serve' ? selectedWinner : (selectedWinner === 'A' ? 'B' : 'A');
          const receivingSide = servingSide === 'A' ? 'B' : 'A';

          const state = {
              id: match.id, sport: 'badminton', matchType: c.matchType, bestOf: match.type === 'group' ? (c.bestOfGroup || 3) : (c.bestOfKO || 3),
              settings: { pointsToWin: c.pointsToWin, deuceEnabled: c.deuceEnabled, deuceCap: c.deuceCap },
              sides: { 
                  A: { id: match.teamA.id, name: match.teamA.name, shortCode: autoShortCode(match.teamA.name), color: '#1a73e8', players: cloneState(match.teamA.players) }, 
                  B: { id: match.teamB.id, name: match.teamB.name, shortCode: autoShortCode(match.teamB.name), color: '#ea4335', players: cloneState(match.teamB.players) } 
              },
              toss: { winner: selectedWinner, decision: selectedDecision },
              officials: { umpire: umpireName, serviceJudge: serviceJudgeName },
              games: [{ number: 1, scoreA: 0, scoreB: 0, winner: null, pointLog: [], completed: false, startTime: Date.now() }], currentGame: 0, gamesWon: { A: 0, B: 0 },
              serverSide: servingSide, serviceCourt: 'Right', status: 'live', result: null, timestamp: Date.now(), comment: '',
              tournamentId: t.id, tournamentMatchId: match.id,
              courtPositions: { A: { right: null, left: null }, B: { right: null, left: null } },
              cards: { A: [], B: [] },
              activeTimer: null
          };
          
          state.courtPositions[servingSide].right = serverId;
          const otherServerPlayer = state.sides[servingSide].players.find(p => p.id !== serverId);
          if (otherServerPlayer && c.matchType === 'doubles') state.courtPositions[servingSide].left = otherServerPlayer.id;

          state.courtPositions[receivingSide].right = receiverId;
          const otherReceiverPlayer = state.sides[receivingSide].players.find(p => p.id !== receiverId);
          if (otherReceiverPlayer && c.matchType === 'doubles') state.courtPositions[receivingSide].left = otherReceiverPlayer.id;

          state.currentServer = serverId; state.currentReceiver = receiverId;
          
          if (window.FBM.user) {
              const flatMatch = { ...match }; delete flatMatch.teamA; delete flatMatch.teamB;
              flatMatch.status = 'live'; window.FBM.saveMatchMeta(flatMatch);
          } else {
              match.status = 'live'; TournamentManager.save();
          }

          AppState.activeMatchId = match.id; AppState.push(state, `Match: ${match.teamA.name} vs ${match.teamB.name}`);
          overlay.remove(); window.Router.navigate('control', { matchId: match.id });
      }}, ['Commence Match']));
      
      modal.appendChild(actions); overlay.appendChild(modal); document.body.appendChild(overlay);
  }
};

  _controlBar(state) {

    bar.appendChild(el('button', { className: 'btn btn-danger', onClick: () => this._stopMatch(state) }, ['End Match']));

    bar.appendChild(el('button', { className: 'btn btn-primary', onClick: () => DisplayManager.launchScoreboard() }, [Icons.tv, ' Stadium Display']));

  },

  _awardPoint(state, winner, reason = null) {
    if(state.status === 'completed') return;
    AppState.update(s => {
        const game = s.games[s.currentGame]; 
        const now = Date.now(); const prevTime = game.pointLog.length > 0 ? game.pointLog[game.pointLog.length - 1].time : (game.startTime || s.timestamp);
        const rallyDuration = Math.max(0, Math.round((now - prevTime) / 1000));
        
        const logEntry = { winner, scoreA: game.scoreA + (winner === 'A' ? 1 : 0), scoreB: game.scoreB + (winner === 'B' ? 1 : 0), serverName: this._getPlayerName(s, s.currentServer), receiverName: this._getPlayerName(s, s.currentReceiver), serviceCourt: s.serviceCourt, time: now, rallyDuration: rallyDuration, reason: reason };

        const isServerWin = (winner === s.serverSide);
        if (winner === 'A') game.scoreA++; else game.scoreB++;

        if (s.matchType === 'doubles') {
            if (isServerWin) { const pos = s.courtPositions[winner]; const temp = pos.right; pos.right = pos.left; pos.left = temp; } 
            else s.serverSide = winner;
            const servingScore = (winner === 'A') ? game.scoreA : game.scoreB;
            s.serviceCourt = (servingScore % 2 === 0) ? 'Right' : 'Left';
            s.currentServer = s.courtPositions[s.serverSide][s.serviceCourt.toLowerCase()];
            const receivingSide = (winner === 'A') ? 'B' : 'A';
            s.currentReceiver = s.courtPositions[receivingSide][s.serviceCourt.toLowerCase()];
        } else {
            s.serverSide = winner; const servingScore = (winner === 'A') ? game.scoreA : game.scoreB;
            s.serviceCourt = (servingScore % 2 === 0) ? 'Right' : 'Left';
            s.courtPositions[winner][s.serviceCourt.toLowerCase()] = s.sides[winner].players[0].id;
            s.courtPositions[winner][s.serviceCourt.toLowerCase() === 'right' ? 'left' : 'right'] = null;
            const receivingSide = (winner === 'A') ? 'B' : 'A';
            s.courtPositions[receivingSide][s.serviceCourt.toLowerCase()] = s.sides[receivingSide].players[0].id;
            s.courtPositions[receivingSide][s.serviceCourt.toLowerCase() === 'right' ? 'left' : 'right'] = null;
            s.currentServer = s.sides[winner].players[0].id; s.currentReceiver = s.sides[receivingSide].players[0].id;
        }

        game.pointLog.push(logEntry);

        const dp = isDeuce(game.scoreA, game.scoreB, s.settings); let gw = null;
        if (dp) { if (game.scoreA >= s.settings.deuceCap) gw = 'A'; else if (game.scoreB >= s.settings.deuceCap) gw = 'B'; else if (game.scoreA - game.scoreB >= 2) gw = 'A'; else if (game.scoreB - game.scoreA >= 2) gw = 'B'; } 
        else { if (game.scoreA >= s.settings.pointsToWin) gw = 'A'; else if (game.scoreB >= s.settings.pointsToWin) gw = 'B'; }

        if (gw) {
            game.winner = gw; game.completed = true; s.gamesWon[gw]++;
            const needed = Math.ceil(s.bestOf / 2);
            if (s.gamesWon.A >= needed || s.gamesWon.B >= needed) { 
                const mw = s.gamesWon.A >= needed ? 'A' : 'B';
                s.status = 'completed'; s.result = `${s.sides[mw].name} wins match`; 
                setTimeout(() => { if(s.tournamentId && AppState.activeMatchId) { TournamentManager.completeMatch(AppState.activeMatchId, s.sides[mw].id, s.gamesWon.A, s.gamesWon.B, AppState.current); Toast.show('Bracket Updated!'); } }, 100);
            } else { 
                s.currentGame++; s.games.push({ number: s.currentGame + 1, scoreA: 0, scoreB: 0, winner: null, pointLog: [], completed: false, startTime: Date.now() }); 
                s.serverSide = gw; s.serviceCourt = 'Right';
                if (s.matchType === 'singles') {
                    s.courtPositions[s.serverSide].right = s.sides[s.serverSide].players[0].id; s.courtPositions[s.serverSide].left = null;
                    const recSide = s.serverSide === 'A' ? 'B' : 'A';
                    s.courtPositions[recSide].right = s.sides[recSide].players[0].id; s.courtPositions[recSide].left = null;
                }
                s.currentServer = s.courtPositions[s.serverSide].right;
                const rSide = s.serverSide === 'A' ? 'B' : 'A'; s.currentReceiver = s.courtPositions[rSide].right;
            }
        }
    }, `Point ${winner}`); window.Router.render();
  },
  _callLet(state) {
      if(state.status === 'completed') return;
      AppState.update(s => { s.games[s.currentGame].pointLog.push({ isLet: true, time: Date.now(), reason: 'Let' }); }, 'Call Let');
      window.Router.render();
  },
  _logEvent(state, msg) {
      if(state.status === 'completed') return;
      AppState.update(s => { s.games[s.currentGame].pointLog.push({ isEvent: true, time: Date.now(), reason: msg }); }, 'Log Event');
      window.Router.render();
  },
  _issueCard(state, side, type) {
      if(state.status === 'completed') return;
      AppState.update(s => { 
          if(!s.cards) s.cards = {A:[], B:[]};
          s.cards[side].push(type);
      }, `Issue ${type} Card`);
      
      const logMsg = `${type} Card issued to ${state.sides[side].shortCode}`;
      
      if(type === 'Red') {
          const opp = side === 'A' ? 'B' : 'A';
          this._awardPoint(AppState.current, opp, `Red Card Fault (${side})`);
      } else if (type === 'Black') {
          const opp = side === 'A' ? 'B' : 'A';
          AppState.update(s => {
              s.status = 'completed';
              s.result = `${s.sides[opp].name} wins by Disqualification (Black Card)`;
              s.games[s.currentGame].pointLog.push({ isEvent: true, time: Date.now(), reason: `Black Card Disqualification to ${s.sides[side].shortCode}` });
          }, 'Black Card Disqualification');
          
          let s = AppState.current;
          if(s.tournamentId && AppState.activeMatchId) {
              TournamentManager.completeMatch(AppState.activeMatchId, s.sides[opp].id, s.gamesWon.A, s.gamesWon.B, s);
          }
          window.Router.render();
      } else {
          this._logEvent(AppState.current, logMsg);
      }
  },
  _startTimer(state, seconds, label) {
      AppState.update(s => {
          s.activeTimer = { endTime: Date.now() + seconds * 1000, label: label };
      }, 'Start Timer');
      window.Router.render();
  },
  _clearTimer(state) {
      AppState.update(s => { s.activeTimer = null; }, 'Clear Timer');
      window.Router.render();
  },
  _manageTimerSync(state) {
      if (this.timerInterval) clearInterval(this.timerInterval);
      this.timerInterval = setInterval(() => {
          const cClock = document.getElementById('control-timer-clock');
          if (cClock && AppState.current?.activeTimer) {
              const remaining = Math.max(0, Math.floor((AppState.current.activeTimer.endTime - Date.now()) / 1000));
              const m = Math.floor(remaining / 60).toString().padStart(2, '0');
              const s = (remaining % 60).toString().padStart(2, '0');
              cClock.innerText = `${m}:${s}`;
              if (remaining <= 0 && cClock.style.color !== 'var(--accent-danger)') cClock.style.color = 'var(--accent-danger)';
          }
      }, 1000);
  },
  _stopMatch(state) {
    if(state.status === 'completed') { window.Router.navigate('tournament'); return; }
    CustomAlert.show('End match and sync score to bracket?', 'confirm', () => {
        AppState.update(s => { s.status = 'completed'; s.result = 'Match Manually Stopped'; }, 'Match Stopped');
        let s = AppState.current;
        if(s.tournamentId && AppState.activeMatchId) {
            let winnerId = null; if (s.gamesWon.A > s.gamesWon.B) winnerId = s.sides.A.id; else if (s.gamesWon.B > s.gamesWon.A) winnerId = s.sides.B.id;
            TournamentManager.completeMatch(AppState.activeMatchId, winnerId, s.gamesWon.A, s.gamesWon.B, s);
        }
        window.Router.navigate('tournament');
    });
  },
  _bindKeyboard(state) {
    const handler = (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return; const key = e.key.toLowerCase();
      if (key === 'a') this._awardPoint(state, 'A'); else if (key === 'b') this._awardPoint(state, 'B'); else if (key === 'z') { if (AppState.undo()) window.Router.render(); }
    };
    document.removeEventListener('keydown', this._kbHandler); this._kbHandler = handler; document.addEventListener('keydown', handler);
  }
};

      let allMatches = [];

          const snap = await getDocs(collection(window.FBM.db, ...window.FBM.basePath, 'matches'));
          snap.forEach(d => { if(d.data().tournamentId === matchState.tournamentId) allMatches.push(d.data()); });
          const tSnap = await getDocs(collection(window.FBM.db, ...window.FBM.basePath, 'teams'));
          const teams = {}; tSnap.forEach(t => teams[t.id] = t.data());
          allMatches.forEach(m => { m.teamA = teams[m.teamAId]; m.teamB = teams[m.teamBId]; });
      } else if (TournamentManager.current) {
          const t = TournamentManager.current;
          if (t.groups) t.groups.forEach(g => g.matches.forEach(m => allMatches.push(m)));
          if (t.koMatches) t.koMatches.forEach(r => r.forEach(m => { if (!m.isBye) allMatches.push(m); }));
      }

      allMatches.sort((a,b) => a.matchNum - b.matchNum);
      const pendingMatches = allMatches.filter(m => m.status === 'pending' && m.teamAId && m.teamBId).slice(0, 4);

      if (pendingMatches.length > 0) {
          const grid = el('div', {className:'up-next-grid'});

              card.appendChild(row);
          });
          
          grid.appendChild(card);
          screen.appendChild(grid);
      }

      container.appendChild(screen);
  }
};

        const gGrid = el('div', { className: 'groups-grid' });

            table.appendChild(el('thead', {}, [el('tr', {}, [
                el('th',{},['#']),
                el('th',{},['Team']),

                el('th',{style:{textAlign:'center'}},['Won'])

            g.teams.forEach((tm, i) => {
                const tr = el('tr', { className: i < t.advanceCount ? 'advancing-row' : '' });

                tr.appendChild(el('td', { className: 'text-muted' }, [String(tm.played)])); tr.appendChild(el('td', { style: {fontWeight: 'bold', color: 'var(--accent-primary)'} }, [String(tm.wins)]));
                tbody.appendChild(tr);
            });
            table.appendChild(tbody); tableWrap.appendChild(table); card.appendChild(tableWrap);
            gGrid.appendChild(card);

        wrap.appendChild(groupSec);

    if (config.showBracket && t.koMatches && t.koMatches.length > 0) {
        const bracketSec = el('div', { style: { marginBottom: '40px', pageBreakBefore: (t.format === 'groups' && config.showGroups) ? 'always' : 'auto' } });
        bracketSec.appendChild(el('h3', {style:{fontFamily:"'Rajdhani', sans-serif", fontSize:'1.5rem', marginBottom:'32px', background:'#0f172a', color:'#fff', padding:'8px', borderRadius:'4px'}}, ['KNOCKOUT BRACKET']));
        
        const scrollWrap = el('div', { className: 'bracket-wrapper' });
        const bracket = el('div', { className: 'bracket' });
        
        t.koMatches.forEach((round, rIndex) => {
            const isFinal = rIndex === t.koMatches.length - 1;
            const roundName = isFinal ? 'Final' : (rIndex === t.koMatches.length - 2 ? 'Semi-Finals' : `Round ${rIndex + 1}`);
            const bRound = el('div', { className: 'bracket-round' });
            bRound.appendChild(el('div', { className: 'round-title', style:{color: '#000'} }, [roundName]));

            round.forEach(m => {
                const isP1Win = m.winnerId && m.teamAId && m.teamAId === m.winnerId;
                const isP2Win = m.winnerId && m.teamBId && m.teamBId === m.winnerId;
                const kMatch = el('div', { className: 'ko-match' });
                
                if(!isFinal) kMatch.appendChild(el('div', {style:{position:'absolute', left:'-20px', top:'50%', transform:'translateY(-50%)', fontSize:'0.6rem', color:'#000', writingMode:'vertical-rl', textOrientation:'mixed', fontWeight:'bold', letterSpacing:'1px'}}, [`M${m.matchNum}`]));

                const renderTeam = (team, label, isBye) => {
                    if (isBye && !team) return `<span style="color:#777; font-style:italic;">BYE</span>`;
                    if (team) return `<div style="display:flex; flex-direction:column; justify-content:center;"><div style="font-size:0.6rem; color:#777; text-transform:uppercase;">${label||''}</div><div style="font-weight: 600;">${escapeHTML(team.name)}</div></div>`;
                    return `<div style="color:#777; font-style:italic; font-weight:600;">${label || 'TBD'}</div>`;
                };

                const t1Row = el('div', { className: 'ko-team ' + (isP1Win ? 'winner' : '') + (m.isBye ? ' is-bye' : '') });
                t1Row.innerHTML = renderTeam(m.teamA, m.labelA, m.isBye) + (isP1Win ? '<span>🏆</span>' : '');
                kMatch.appendChild(t1Row);

    if (t.koMatches) t.koMatches.forEach(r => r.forEach(m => { if(m.status==='completed' && !m.isBye) allMatches.push({...m, stage: m.stage}); }));

        const statsSec = el('div', { style: { marginBottom: '40px', pageBreakBefore: 'always' } });

        const sTable = el('table', { className: 'report-table' });
        sTable.appendChild(el('thead', {}, [el('tr', {}, [
            el('th',{},['Team']), el('th',{style:{textAlign:'center'}},['Matches (W-L)']), el('th',{style:{textAlign:'center'}},['Win Rate']), el('th',{style:{textAlign:'center'}},['Games (W-L)']), el('th',{style:{textAlign:'center'}},['Pts Scored']), el('th',{style:{textAlign:'center'}},['Pts Conceded']), el('th',{style:{textAlign:'center'}},['Pt Diff'])
        ])]));
        const sBody = el('tbody');

        const teamStats = {};
        t.teams.forEach(team => {
            teamStats[team.id] = { name: team.name, matchesWon: 0, matchesPlayed: 0, gamesWon: 0, gamesLost: 0, ptsScored: 0, ptsConceded: 0 };
        });

        allMatches.forEach(m => {
            if (teamStats[m.teamAId]) {
                teamStats[m.teamAId].matchesPlayed++;
                if(m.winnerId === m.teamAId) teamStats[m.teamAId].matchesWon++;
            }
            if (teamStats[m.teamBId]) {
                teamStats[m.teamBId].matchesPlayed++;
                if(m.winnerId === m.teamBId) teamStats[m.teamBId].matchesWon++;
            }

            const fullState = window.__HISTORY_DETAILS_MAP ? window.__HISTORY_DETAILS_MAP[m.id] : m.fullState;
            if (fullState && fullState.games) {
                if (teamStats[m.teamAId]) {
                    teamStats[m.teamAId].gamesWon += fullState.gamesWon['A'] || 0;
                    teamStats[m.teamAId].gamesLost += fullState.gamesWon['B'] || 0;
                }
                if (teamStats[m.teamBId]) {
                    teamStats[m.teamBId].gamesWon += fullState.gamesWon['B'] || 0;
                    teamStats[m.teamBId].gamesLost += fullState.gamesWon['A'] || 0;
                }

                fullState.games.forEach(g => {
                    if (teamStats[m.teamAId]) { teamStats[m.teamAId].ptsScored += g.scoreA; teamStats[m.teamAId].ptsConceded += g.scoreB; }
                    if (teamStats[m.teamBId]) { teamStats[m.teamBId].ptsScored += g.scoreB; teamStats[m.teamBId].ptsConceded += g.scoreA; }
                });
            } else {
                if(m.winnerId === m.teamAId) {
                    if(teamStats[m.teamAId]) { teamStats[m.teamAId].gamesWon += 2; teamStats[m.teamAId].ptsScored += 42; teamStats[m.teamAId].ptsConceded += 20; }
                    if(teamStats[m.teamBId]) { teamStats[m.teamBId].gamesLost += 2; teamStats[m.teamBId].ptsScored += 20; teamStats[m.teamBId].ptsConceded += 42; }
                } else if(m.winnerId === m.teamBId) {
                    if(teamStats[m.teamBId]) { teamStats[m.teamBId].gamesWon += 2; teamStats[m.teamBId].ptsScored += 42; teamStats[m.teamBId].ptsConceded += 20; }
                    if(teamStats[m.teamAId]) { teamStats[m.teamAId].gamesLost += 2; teamStats[m.teamAId].ptsScored += 20; teamStats[m.teamAId].ptsConceded += 42; }
                }
            }
        });

        const sortedStats = Object.values(teamStats).sort((a, b) => {
            const aWR = a.matchesPlayed > 0 ? (a.matchesWon / a.matchesPlayed) : 0;
            const bWR = b.matchesPlayed > 0 ? (b.matchesWon / b.matchesPlayed) : 0;
            if (bWR !== aWR) return bWR - aWR;
            return (b.ptsScored - b.ptsConceded) - (a.ptsScored - a.ptsConceded);
        });

        sortedStats.forEach(ts => {

        });

        statsSec.appendChild(sTable);

        allMatches.forEach(m => {
            const mWrap = el('div', { className: 'card', style: { marginBottom: '16px', padding: '16px', border: '1px solid #ccc', breakInside: 'avoid' } });
            
            const mHead = el('div', { style: { display: 'flex', justifyContent: 'space-between', borderBottom: '2px solid #eee', paddingBottom: '8px', marginBottom: '12px' } });
            mHead.appendChild(el('div', { style: { fontWeight: 'bold', fontSize: '1.1rem' } }, [`M${m.matchNum} (${m.stage}): ${m.teamA?.name || 'TBA'} vs ${m.teamB?.name || 'TBA'}`]));
            
            const wName = m.winnerId === m.teamAId ? m.teamA?.name : (m.winnerId === m.teamBId ? m.teamB?.name : 'Unknown');
            mHead.appendChild(el('div', { style: { color: '#2e7d32', fontWeight: 'bold' } }, [`Winner: ${wName} (${m.scoreA} - ${m.scoreB})`]));
            mWrap.appendChild(mHead);

            const fullState = window.__HISTORY_DETAILS_MAP ? window.__HISTORY_DETAILS_MAP[m.id] : m.fullState;

            if (fullState && fullState.games) {
                fullState.games.forEach((g, i) => {
                    const gWrap = el('div', { style: { marginTop: '16px', borderTop: '1px solid #eee', paddingTop: '16px' } });
                    gWrap.appendChild(el('div', { style: { fontWeight: 'bold', marginBottom: '8px', color: '#1a73e8' } }, [`Game ${i + 1} — Score: ${g.scoreA} - ${g.scoreB}`]));

                    if (g.pointLog && g.pointLog.length > 0) {
                        const table = el('table', { className: 'report-table', style: { margin: 0, fontSize: '0.8rem' } });
                        table.appendChild(el('thead', {}, [el('tr', {}, [ 
                            el('th',{style:{width:'5%'}},['No.']), 
                            el('th',{style:{width:'15%'}},['Server']), 
                            el('th',{style:{width:'15%'}},['Receiver']), 
                            el('th',{style:{width:'10%', textAlign:'center'}},['Court']), 
                            el('th',{style:{width:'10%', textAlign:'center'}},['Duration']), 
                            el('th',{style:{width:'15%', textAlign:'center'}},[`Score (${fullState.sides.A.shortCode}-${fullState.sides.B.shortCode})`]), 
                            el('th',{style:{width:'15%'}},['Winner']),
                            el('th',{style:{width:'15%'}},['Remarks'])
                        ])]));
                        const tbody = el('tbody');
                        g.pointLog.forEach((pt, pi) => {
                          if (pt.isLet || pt.isEvent) {
                              let eventStyle = pt.isEvent && pt.reason && pt.reason.includes('Card') ? 'color: #e53935; font-weight: bold;' : 'font-style:italic; color:#777;';
                              tbody.appendChild(el('tr', { style: { background: 'rgba(0,0,0,0.02)' } }, [ el('td',{},[String(pi + 1)]), el('td',{colSpan: 7, style: eventStyle},[pt.isLet ? 'LET (Replay Point)' : pt.reason]) ]));
                              return;
                          }
                          tbody.appendChild(el('tr', { className: pt.winner ? 'rally-won' : '' }, [ 
                              el('td',{},[String(pi + 1)]), 
                              el('td',{},[pt.serverName || '—']), 
                              el('td',{},[pt.receiverName || '—']), 
                              el('td',{style:{textAlign:'center'}},[pt.serviceCourt || '—']), 
                              el('td',{style:{textAlign:'center'}},[`${pt.rallyDuration !== undefined ? pt.rallyDuration : '-'}s`]), 
                              el('td',{style:{textAlign:'center', fontWeight:'bold', fontSize:'1.1em'}},[`${pt.scoreA} - ${pt.scoreB}`]), 
                              el('td',{className: 'highlight'},[fullState.sides[pt.winner].name]),
                              el('td',{style:{color:'#e53935', fontSize:'0.8em', fontWeight:'bold'}},[pt.reason || '—'])
                          ]));
                        });
                        table.appendChild(tbody); gWrap.appendChild(table);
                    } else {
                        gWrap.appendChild(el('div', { style: { color: '#78909c', fontSize: '0.85rem', fontStyle: 'italic' } }, ['No rally details for this game.']));
                    }
                    mWrap.appendChild(gWrap);
                });
            } else {
                mWrap.appendChild(el('div', { style: { color: '#78909c', fontSize: '0.9rem', fontStyle: 'italic', marginTop: '10px' } }, ['Match simulated manually (No point-by-point timeline available).']));
            }
            resSec.appendChild(mWrap);
        });
        wrap.appendChild(resSec);
    }
    
    container.appendChild(wrap);
  }
};

/* ─── UNIVERSAL CSV→TOURNAMENT BUILDER ─────────────────────────────── */
/* Parses any fixture CSV (or GGS_DATA) and fully builds tournament state:
   teams, groups, matches, court, time, round — no pre-existing tourney needed */
window.buildTournamentFromFixtures = function(fixtureRows, teamRosterMap, tourneyName) {
    // fixtureRows: [{matchNum, stage, teamA, teamB, time, court}, ...]
    // teamRosterMap: { 'Team Name': {p1, p2} } — optional player names
    // Returns {meta, teams, matches}

    const tourneyId = Math.random().toString(36).slice(2, 8).toUpperCase();
    const teamRegistry = {}; // name → team object

    const getOrCreateTeam = (name) => {
        const key = name.trim();
        if (!key) return null;
        if (!teamRegistry[key]) {
            const roster = teamRosterMap && teamRosterMap[key];
            teamRegistry[key] = {
                id: uid(),
                name: key,
                tournamentId: tourneyId,
                players: roster
                    ? [{ id: uid(), name: roster.p1 }, { id: uid(), name: roster.p2 }]
                    : [{ id: uid(), name: `${key} P1` }, { id: uid(), name: `${key} P2` }],
            };
        }
        return teamRegistry[key];
    };

    // Parse stage: "Group A (Round 1)" → { groupId: 'A', roundNum: 1, type: 'group' }
    //              "Semi-Finals" / "Final" / "Round 1" → { type: 'ko', roundIndex: N }
    const parseStage = (stage) => {
        const grpMatch = stage.match(/Group\s+([A-Z])\s*\(Round\s*(\d+)\)/i);
        if (grpMatch) return { type: 'group', groupId: grpMatch[1].toUpperCase(), roundNum: parseInt(grpMatch[2]) };
        const grpOnly = stage.match(/Group\s+([A-Z])/i);
        if (grpOnly) return { type: 'group', groupId: grpOnly[1].toUpperCase(), roundNum: 1 };
        // KO round name → index
        const koNames = ['Round 1','Round 2','Round 3','Round 4','Quarter-Finals','Semi-Finals','Final','3rd Place'];
        let ri = koNames.findIndex(n => stage.toLowerCase().includes(n.toLowerCase()));
        if (ri === -1) ri = 0;
        return { type: 'ko', roundIndex: ri };
    };

    // Build group membership from fixtures (which teams appear in which group)
    const groupTeams = {}; // groupId → Set of team names

    fixtureRows.forEach(row => {
        const info = parseStage(row.stage);
        if (info.type === 'group') {
            if (!groupTeams[info.groupId]) groupTeams[info.groupId] = new Set();
            if (row.teamA) groupTeams[info.groupId].add(row.teamA.trim());
            if (row.teamB) groupTeams[info.groupId].add(row.teamB.trim());
        }
    });

    // Assign groupId to each team
    Object.entries(groupTeams).forEach(([gId, names]) => {
        names.forEach(name => {
            const t = getOrCreateTeam(name);
            if (t) t.groupId = gId;
        });
    });

    // Pre-create teams that appear in fixtures but not yet in registry
    fixtureRows.forEach(row => {
        if (row.teamA) getOrCreateTeam(row.teamA);
        if (row.teamB) getOrCreateTeam(row.teamB);
    });

    const teams = Object.values(teamRegistry);
    const teamByName = (n) => n ? teams.find(t => t.name.toLowerCase() === n.trim().toLowerCase()) : null;

    // Build matches
    const matches = [];
    const groupIds = Object.keys(groupTeams).sort();
    const numGroups = groupIds.length;
    const advanceCount = 2; // default 2 per group advance

    // KO round index tracking
    const koRoundNames = ['Round 1','Round 2','Round 3','Round 4','Quarter-Finals','Semi-Finals','Final','3rd Place'];
    const koRoundIndex = {};

    fixtureRows.forEach(row => {
        const info = parseStage(row.stage);
        const tA = teamByName(row.teamA);
        const tB = teamByName(row.teamB);

        if (info.type === 'group') {
            matches.push({
                id: `M_${row.matchNum}_${uid().slice(0,4)}`,
                tournamentId: tourneyId,
                type: 'group',
                groupId: info.groupId,
                stage: row.stage,
                roundNum: info.roundNum,
                teamAId: tA ? tA.id : null,
                teamBId: tB ? tB.id : null,
                labelA: row.teamA || 'TBD',
                labelB: row.teamB || 'TBD',
                status: 'pending', scoreA: 0, scoreB: 0, winnerId: null,
                matchNum: row.matchNum,
                scheduledTime: row.time || '',
                court: row.court ? String(row.court) : '',
            });
        } else {
            const stageLower = row.stage.toLowerCase();
            let ri = 0;
            if (stageLower.includes('final') && !stageLower.includes('semi') && !stageLower.includes('quarter')) ri = 99;
            else if (stageLower.includes('semi')) ri = 98;
            else if (stageLower.includes('quarter')) ri = 97;
            else if (stageLower.includes('3rd') || stageLower.includes('third')) ri = 96;
            else {
                const rn = row.stage.match(/Round\s*(\d+)/i);
                ri = rn ? (parseInt(rn[1]) - 1) : 0;
            }
            // Normalise so Final=last; we'll fix order after
            if (!koRoundIndex[ri]) koRoundIndex[ri] = [];
            const mi = koRoundIndex[ri].length;
            koRoundIndex[ri].push(row.matchNum);
            matches.push({
                id: `KO_${row.matchNum}_${uid().slice(0,4)}`,
                tournamentId: tourneyId,
                type: 'ko',
                roundIndex: ri,
                matchIndex: mi,
                stage: row.stage,
                teamAId: tA ? tA.id : null,
                teamBId: tB ? tB.id : null,
                labelA: row.teamA || 'TBD',
                labelB: row.teamB || 'TBD',
                status: 'pending', scoreA: 0, scoreB: 0, winnerId: null,
                matchNum: row.matchNum,
                scheduledTime: row.time || '',
                court: row.court ? String(row.court) : '',
            });
        }
    });

    // Remap KO round indices to contiguous 0..N
    const koKeys = Object.keys(koRoundIndex).map(Number).sort((a,b)=>a-b);
    const koRemap = {}; koKeys.forEach((k, i) => koRemap[k] = i);
    matches.filter(m => m.type === 'ko').forEach(m => { m.roundIndex = koRemap[m.roundIndex] ?? m.roundIndex; });

    const meta = {
        id: tourneyId,
        name: tourneyName || 'Imported Tournament',
        format: numGroups > 0 ? 'groups' : 'knockout',
        phase: numGroups > 0 ? 'rr' : 'ko',
        numGroups: numGroups,
        advanceCount: advanceCount,
        settings: { matchType: 'doubles', bestOfGroup: 1, bestOfKO: 3, pointsToWin: 21, deuceEnabled: true, deuceCap: 30 },
        status: 'active', createdAt: Date.now()
    };

    return { meta, teams, matches };
};

/* Load GGS tournament from static data */
window.loadGGSTournament = function() {
    const d = window.GGS_DATA;
    const rosterMap = {};
    d.teams.forEach(t => { rosterMap[t.name] = { p1: t.p1, p2: t.p2 }; });

    const fixtureRows = d.fixtures.map(f => ({
        matchNum: f[0], stage: f[1], teamA: f[2], teamB: f[3], time: f[4], court: f[5]
    }));

    const { meta, teams, matches } = window.buildTournamentFromFixtures(fixtureRows, rosterMap, d.name);
    TournamentManager.current = TournamentManager.hydrate(meta, teams, matches);
    localStorage.setItem('ACTIVE_TOURNEY_ID', meta.id);
    localStorage.setItem('USER_ROLE', 'umpire');
    if (window.FBM.user) {
        window.FBM.createTournamentData(meta, teams, matches);
        window.FBM.startTournamentSync(meta.id, (tourney) => {
            TournamentManager.current = tourney;
            if (window.Router.currentView === 'tournament') window.Router.render();
        });
    } else {
        TournamentManager.save();
    }
    Toast.show('GGS Tournament 2026 loaded — 32 teams, 8 groups, 48 fixtures!');
    window.Router.navigate('tournament');
};
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => { window.Router.init(); window.addEventListener('popstate', () => window.Router.init()); });
} else { window.Router.init(); window.addEventListener('popstate', () => window.Router.init()); }
</script>
