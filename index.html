          const shuffled = [...teams].sort(() => Math.random() - 0.5);
          shuffled.forEach((p, i) => { 
              p.groupId = groups[i % meta.numGroups].id; 
              groups[i % meta.numGroups].teams.push(p); 
          });
          matches = TournamentManager.generateGroupMatches(tourneyId, groups);
      } else {
          const qualified = teams.map((t, i) => ({ ...t, seedLabel: `Seed ${i+1}` }));
          matches = TournamentManager.generateBWFKnockout(tourneyId, qualified, 1);
      }

      TournamentManager.current = TournamentManager.hydrate(meta, teams, matches);
      localStorage.setItem('ACTIVE_TOURNEY_ID', tourneyId);

      if (window.FBM.user) {
          window.FBM.createTournamentData(meta, teams, matches);
          
          window.FBM.startTournamentSync(tourneyId, (tourney) => {
              TournamentManager.current = tourney;
              if (window.Router.currentView === 'tournament' && !tourney) window.Router.navigate('home');
              else if (window.Router.currentView === 'tournament') window.Router.render();
          });
      } else {
          TournamentManager.save();
      }

      Toast.show('Tournament Generated!'); 
      window.Router.render();
  },

  /* --- TOURNAMENT DASHBOARD --- */
  _renderDashboard(container) {
      const t = TournamentManager.current; const wrap = el('div', { className: 'tournament-hub' });
      const isSpectator = localStorage.getItem('USER_ROLE') === 'spectator';
      
      const header = el('div', {className: 'flex justify-between items-center mb-lg flex-wrap gap-md'});
      const titleArea = el('div', {className: 'flex flex-col gap-xs'});
      titleArea.appendChild(el('h2', { className: 'section-header', style:{margin:0, color: 'var(--text-primary)'} }, [Icons.trophy, ` ${t.name.toUpperCase()}`]));
      titleArea.appendChild(el('div', { className: 'text-sm text-secondary mono', style: { background: 'rgba(255,255,255,0.1)', padding: '4px 10px', borderRadius: '4px', width: 'fit-content', userSelect: 'all', fontWeight:'bold'} }, [`ID: ${t.id}`]));
      header.appendChild(titleArea);

      const actions = el('div', {className: 'flex gap-sm flex-wrap'});
      actions.appendChild(el('button', { className: 'btn btn-ghost btn-sm', onClick: () => window.Router.navigate('home') }, ['← Exit']));
      
      if (!isSpectator) {
          actions.appendChild(el('button', { className: 'btn btn-primary btn-sm', onClick: () => window.showReportConfigModal(t.id) }, ['🖨️ Tourney Report']));
          actions.appendChild(el('button', { className: 'btn btn-danger btn-sm', onClick: () => {
              CustomAlert.show('End tournament and save to History?', 'confirm', async () => { await TournamentManager.archiveCurrent(); window.Router.navigate('home'); });
          } }, ['End Tourney']));
      }
      
      header.appendChild(actions); wrap.appendChild(header);

      // Show umpire session info bar if logged in as umpire
      const umpSessIdBanner = localStorage.getItem('UMPIRE_SESSION_ID');
      const umpSessNameBanner = localStorage.getItem('UMPIRE_SESSION_NAME');
      if (umpSessIdBanner && isSpectator) {
          const umpBanner = el('div', {style:{background:'rgba(79,195,247,0.1)', border:'1px solid rgba(79,195,247,0.3)', borderRadius:'var(--radius-sm)', padding:'8px 16px', marginBottom:'16px', display:'flex', justifyContent:'space-between', alignItems:'center', fontSize:'0.85rem'}});
          umpBanner.appendChild(el('span', {}, [`🎙️ Umpire Session: `+el('strong',{},['x']).outerHTML.replace('>x<',`><strong>${umpSessNameBanner}</strong> (${umpSessIdBanner})<`)+'']));
          umpBanner.innerHTML = `🎙️ Umpire Session: <strong style="color:var(--accent-primary)">${umpSessNameBanner}</strong> <span style="color:var(--text-muted)">(ID: ${umpSessIdBanner})</span> — <a onclick="localStorage.removeItem('UMPIRE_SESSION_ID');localStorage.removeItem('UMPIRE_SESSION_NAME');localStorage.setItem('USER_ROLE','spectator');window.Router.navigate('home');" style="color:var(--accent-danger);cursor:pointer;">Exit Session</a>`;
          wrap.appendChild(umpBanner);
      }

      const tabs = el('div', { className: 'tourney-tabs' });
      const tabOptions = [];
      const umpirePerms = this._getUmpirePermissions ? this._getUmpirePermissions() : {};
      const umpSessId = localStorage.getItem('UMPIRE_SESSION_ID');
      
      // Spectator = fan OR umpire. Umpires get filtered tabs based on permissions.
      const isUmpireSession = isSpectator && !!umpSessId;
      const isFanOnly = isSpectator && !umpSessId;
      const canSeeTeams    = !isSpectator || (isUmpireSession && umpirePerms.canViewTeams !== false);
      const canSeeSchedule = !isSpectator || (isUmpireSession && umpirePerms.canViewSchedule !== false);
      const canSeeGroups   = !isSpectator || (isUmpireSession && umpirePerms.canViewGroups !== false);
      const canSeeBracket  = !isSpectator || (isUmpireSession && umpirePerms.canViewBracket !== false);
      const canSeeStats    = !isSpectator || (isUmpireSession && umpirePerms.canViewStats !== false);
      
      // Fan spectators always get the Fixtures (live scores) tab first
      if (isFanOnly) tabOptions.push(['fixtures', '🔴 Live Fixtures']);
      if (canSeeTeams)    tabOptions.push(['teams',    '👥 Teams & Players']);
      if (canSeeSchedule) tabOptions.push(['schedule', '📅 Master Schedule']);
      if (t.format === 'groups' && canSeeGroups) tabOptions.push(['groups', '📊 Group Stages']);
      if (canSeeBracket)  tabOptions.push(['bracket',  '🏆 Knockout Bracket']);
      if (canSeeStats)    tabOptions.push(['playerstats', '📈 Player Stats']);
      if (!isSpectator)   tabOptions.push(['settings', '⚙️ Settings']);
      
      if (!this.activeTab || !tabOptions.find(opt => opt[0] === this.activeTab)) this.activeTab = tabOptions[0]?.[0] || 'teams';
      tabOptions.forEach(([key, label]) => { tabs.appendChild(el('div', { className: 'tourney-tab' + (this.activeTab === key ? ' active' : ''), onClick: () => {
          // Clean up live sync when leaving fixtures tab
          if (this.activeTab === 'fixtures' && key !== 'fixtures') {
              if (window.TournamentHub._liveSyncUnsub) {
                  Object.values(window.TournamentHub._liveSyncUnsub).forEach(fn => { if (typeof fn === 'function') fn(); });
                  window.TournamentHub._liveSyncUnsub = {};
              }
              if (window.TournamentHub._livePollerInterval) {
                  clearInterval(window.TournamentHub._livePollerInterval);
                  delete window.TournamentHub._livePollerInterval;
              }
          }
          this.activeTab = key; window.Router.render();
      } }, [label])); });
      wrap.appendChild(tabs);

      if (this.activeTab === 'fixtures' && isFanOnly) wrap.appendChild(this._renderLiveFixtures(t));
      if (this.activeTab === 'teams')       wrap.appendChild(this._renderTeamsTab(t, isSpectator));
      if (this.activeTab === 'schedule')    wrap.appendChild(this._renderSchedule(t, isSpectator));
      if (this.activeTab === 'groups')      wrap.appendChild(this._renderGroupsTab(t, isSpectator));
      if (this.activeTab === 'bracket')     wrap.appendChild(this._renderBracket(t, isSpectator));
      if (this.activeTab === 'playerstats') wrap.appendChild(this._renderPlayerStats(t));
      if (this.activeTab === 'settings' && !isSpectator) wrap.appendChild(this._renderSettingsTab(t));
      container.appendChild(wrap);
  },

  /* Permission helpers */
  _getUmpirePermissions() {
      try { return JSON.parse(localStorage.getItem('UMPIRE_PERMISSIONS')||'{}'); } catch(e) { return {}; }
  },
  _saveUmpirePermissions(perms) {
      localStorage.setItem('UMPIRE_PERMISSIONS', JSON.stringify(perms));
  },

  /* ═══════════════════════════════════════════════════════════════
     TEAMS & PLAYERS TAB  — add / export / search
  ═══════════════════════════════════════════════════════════════ */
  _renderTeamsTab(t, isSpectator) {
      const wrap = el('div', { className: 'w-full' });
      const isDoubles = t.settings?.matchType === 'doubles';

      /* ── Top action bar ─────────────────────────────────────── */
      const topBar = el('div', {className:'flex justify-between items-center mb-md flex-wrap gap-sm'});

      const statChip = (icon, val, label) => {
          const c = el('div', {style:{display:'flex', alignItems:'center', gap:'6px', background:'rgba(255,255,255,0.06)', padding:'6px 12px', borderRadius:'var(--radius-sm)', border:'1px solid var(--border-color)'}});
          c.innerHTML = `<span style="font-size:1.1rem">${icon}</span><span style="font-weight:800;color:var(--text-primary)">${val}</span><span style="font-size:0.75rem;color:var(--text-muted);font-weight:600">${label}</span>`;
          return c;
      };
      const statsRow = el('div', {style:{display:'flex', gap:'8px', flexWrap:'wrap', alignItems:'center'}});
      statsRow.appendChild(statChip('👥', t.teams.length, 'Teams'));
      statsRow.appendChild(statChip('🏸', t.teams.reduce((n,tm)=>n+(tm.players||[]).filter(p=>p?.name?.trim()).length,0), 'Players'));
      statsRow.appendChild(statChip('🔷', t.groups?.length || 0, 'Groups'));
      if (!isSpectator) {
          statsRow.appendChild(el('span', {style:{fontSize:'0.75rem', color:'var(--text-muted)', fontStyle:'italic', paddingLeft:'4px'}}, ['✏️ Click any name to edit']));
      }
      topBar.appendChild(statsRow);

      const actionBtns = el('div', {className:'teams-action-bar', style:{display:'flex', gap:'8px', flexWrap:'wrap', alignItems:'center'}});

      /* Search */
      const searchInp = el('input', {type:'text', placeholder:'🔍 Search team or player…', style:{width:'200px', fontSize:'0.85rem', padding:'8px 12px'}});

      /* Export CSV */
      const exportBtn = el('button', {className:'btn btn-success btn-sm', onClick: () => {
          let csv = 'Group,#,Team Name,Player 1,Player 2\n';
          const groupOrder = t.groups ? t.groups.map(g => g.id) : [];
          const grouped = {};
          groupOrder.forEach(gId => grouped[gId] = []);
          t.teams.forEach(tm => {
              const gId = tm.groupId || (t.groups && t.groups.find(g => g.teams.find(x=>x.id===tm.id))?.id);
              if (gId && grouped[gId]) grouped[gId].push(tm);
              else { grouped[''] = grouped[''] || []; grouped[''].push(tm); }
          });
          [...groupOrder, ''].forEach(gId => {
              (grouped[gId] || []).forEach((tm, i) => {
                  const p1 = tm.players?.[0]?.name?.trim() || '';
                  const p2 = tm.players?.[1]?.name?.trim() || '';
                  csv += `"${gId ? 'Group '+gId : 'Unassigned'}",${i+1},"${tm.name}","${p1}","${p2}"\n`;
              });
          });
          const link = document.createElement('a');
          link.href = 'data:text/csv;charset=utf-8,' + encodeURI(csv);
          link.download = `${t.name.replace(/\s+/g,'_')}_Teams.csv`;
          link.click();
          Toast.show('Teams exported as CSV');
      }}, ['⬇️ Export Teams CSV']);

      /* Add team — master only */
      if (!isSpectator) {
          const addBtn = el('button', {className:'btn btn-primary btn-sm', onClick: () => {
              const overlay = el('div', {className:'modal-overlay'});
              const modal = el('div', {className:'modal', style:{maxWidth:'440px'}});
              modal.appendChild(el('div', {className:'modal-title'}, ['➕ Add New Team']));

              const groupIds = (t.groups || []).map(g => g.id);
              const tmNameInp = el('input', {type:'text', placeholder:'Team Name', style:{marginBottom:'10px'}});
              const p1Inp = el('input', {type:'text', placeholder:'Player 1 Name', style:{marginBottom:'10px'}});
              const p2Inp = el('input', {type:'text', placeholder:'Player 2 Name (for doubles)', style:{marginBottom:'10px'}});

              let selGroup = groupIds[0] || '';
              const grpSel = el('select', {style:{marginBottom:'16px'}, onChange: e => selGroup = e.target.value});
              grpSel.appendChild(el('option', {value:''}, ['— No Group —']));
              groupIds.forEach(gId => grpSel.appendChild(el('option', {value:gId}, [`Group ${gId}`])));

              [tmNameInp, p1Inp, isDoubles ? p2Inp : null, groupIds.length ? grpSel : null]
                  .filter(Boolean).forEach(el => modal.appendChild(el));

              const btnRow = el('div', {className:'flex gap-sm mt-md', style:{justifyContent:'flex-end'}});
              btnRow.appendChild(el('button', {className:'btn btn-ghost', onClick:()=>overlay.remove()}, ['Cancel']));
              btnRow.appendChild(el('button', {className:'btn btn-primary', onClick:()=>{
                  const name = tmNameInp.value.trim();
                  if (!name) { Toast.show('Enter a team name', 'error'); return; }
                  const players = [];
                  if (p1Inp.value.trim()) players.push({id:uid(), name:p1Inp.value.trim()});
                  if (isDoubles && p2Inp.value.trim()) players.push({id:uid(), name:p2Inp.value.trim()});
                  if (!players.length) players.push({id:uid(), name:`${name} P1`});

                  const newTeam = {id:uid(), name, tournamentId:t.id, players, groupId: selGroup || null};
                  t.teams.push(newTeam);

                  // Add to group roster if selected
                  if (selGroup) {
                      const grp = t.groups?.find(g=>g.id===selGroup);
                      if (grp) grp.teams.push({...newTeam, played:0, wins:0});
                  }
                  if (window.FBM.user) {
                      window.FBM.db && setDoc(doc(window.FBM.db, ...window.FBM.basePath, 'teams', newTeam.id), newTeam).catch(()=>{});
                  } else { TournamentManager.save(); }
                  overlay.remove();
                  Toast.show(`✅ ${name} added!`);
                  window.Router.render();
              }}, ['Add Team']));
              modal.appendChild(btnRow);
              overlay.appendChild(modal); document.body.appendChild(overlay);
              setTimeout(()=>tmNameInp.focus(),80);
          }}, ['+ Add Team']);
          actionBtns.appendChild(addBtn);
      }
      actionBtns.appendChild(exportBtn);
      actionBtns.appendChild(searchInp);
      topBar.appendChild(actionBtns);
      wrap.appendChild(topBar);

      /* ── Build group buckets ─────────────────────────────────── */
      const groupOrder = t.groups ? t.groups.map(g => g.id) : [];
      const buckets = {};
      const noGroup = [];
      groupOrder.forEach(gId => { buckets[gId] = []; });
      t.teams.forEach(tm => {
          const gId = tm.groupId || (t.groups?.find(g=>g.teams?.find(x=>x.id===tm.id))?.id);
          if (gId && buckets[gId] !== undefined) buckets[gId].push(tm);
          else noGroup.push(tm);
      });

      const GRP_COLORS = ['#4fc3f7','#ffa726','#66bb6a','#ef5350','#ab47bc','#26c6da','#d4e157','#ff7043'];

      const outerGrid = el('div', {id:'teams-outer-grid', style:{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(320px, 1fr))', gap:'16px'}});

      /* ── Central save helper: persists name changes everywhere ── */
      const persistTeamRename = (teamId, newName, newPlayers) => {
          // Update in t.teams
          const tm = t.teams.find(x=>x.id===teamId);
          if (!tm) return;
          if (newName !== undefined) tm.name = newName;
          if (newPlayers !== undefined) tm.players = newPlayers;
          // Update in group.teams (standings objects)
          if (t.groups) t.groups.forEach(g => {
              const gt = g.teams.find(x=>x.id===teamId);
              if (gt) { if (newName!==undefined) gt.name=newName; }
          });
          // Persist
          if (window.FBM.user) { window.FBM.saveTeam(tm); }
          else { TournamentManager.save(); }
      };

      const renderGroup = (gId, teams, colorIdx) => {
          if (teams.length === 0 && gId) return; // skip empty named groups
          const color = GRP_COLORS[colorIdx % GRP_COLORS.length];
          const card = el('div', {className:'card', style:{padding:'0', overflow:'hidden', border:`1px solid ${color}33`}});

          const hdr = el('div', {style:{background:`${color}12`, borderBottom:`2px solid ${color}40`, padding:'10px 16px', display:'flex', justifyContent:'space-between', alignItems:'center'}});
          hdr.appendChild(el('span', {style:{fontFamily:"'Rajdhani',sans-serif", fontWeight:'800', fontSize:'1.05rem', color, letterSpacing:'0.08em'}}, [gId ? `GROUP  ${gId}` : 'UNASSIGNED']));
          hdr.appendChild(el('span', {style:{fontSize:'0.75rem', color:'var(--text-muted)', fontWeight:'700', background:'rgba(0,0,0,0.2)', padding:'2px 8px', borderRadius:'10px'}}, [`${teams.length} team${teams.length!==1?'s':''}`]));
          card.appendChild(hdr);

          teams.forEach((tm, idx) => {
              const row = el('div', {
                  className:'team-row',
                  style:{padding:'10px 16px', borderBottom: idx<teams.length-1?'1px solid var(--border-color)':'none', display:'flex', flexDirection:'column', gap:'6px'}
              });

              if (!isSpectator) {
                  /* ── EDITABLE mode (master console) ── */
                  // Team name input
                  const nameRow = el('div', {style:{display:'flex', alignItems:'center', gap:'8px'}});
                  const badge = el('span', {style:{minWidth:'24px', height:'24px', borderRadius:'50%', background:color+'20', color, fontSize:'0.72rem', fontWeight:'900', display:'flex', alignItems:'center', justifyContent:'center', border:`1px solid ${color}40`, flexShrink:'0'}}, [String(idx+1)]);
                  nameRow.appendChild(badge);
                  const nameInp = el('input', {type:'text', value:tm.name, title:'Click to edit team name',
                      style:{flex:'1', padding:'5px 10px', fontSize:'0.88rem', fontWeight:'700', background:'rgba(0,0,0,0.25)', border:'1px solid rgba(255,255,255,0.08)', borderRadius:'6px', color:'var(--text-primary)', transition:'border 0.2s'}});
                  nameInp.addEventListener('focus', ()=>nameInp.style.borderColor='var(--accent-primary)');
                  nameInp.addEventListener('blur', ()=>{
                      nameInp.style.borderColor='rgba(255,255,255,0.08)';
                      const val = nameInp.value.trim();
                      if (val && val !== tm.name) {
                          persistTeamRename(tm.id, val, undefined);
                          Toast.show(`✏️ Team renamed → ${val}`);
                          // Update all match labels referencing this team
                          const updateMatchLabels = (matches) => matches.forEach(m => {
                              if (m.teamAId===tm.id) m.labelA=val;
                              if (m.teamBId===tm.id) m.labelB=val;
                          });
                          if (t.groups) t.groups.forEach(g=>updateMatchLabels(g.matches));
                          if (t.koMatches) t.koMatches.forEach(r=>updateMatchLabels(r));
                      }
                  });
                  nameRow.appendChild(nameInp);
                  row.appendChild(nameRow);

                  // Player name inputs
                  const players = tm.players || [];
                  if (players.length) {
                      const pRow = el('div', {style:{display:'flex', gap:'8px', paddingLeft:'32px', flexWrap:'wrap'}});
                      players.forEach((p, pi) => {
                          const pWrap = el('div', {style:{display:'flex', alignItems:'center', gap:'5px', flex:'1', minWidth:'140px'}});
                          pWrap.appendChild(el('span', {style:{fontSize:'0.65rem', background:'rgba(255,255,255,0.07)', color:'var(--text-muted)', padding:'1px 6px', borderRadius:'3px', fontWeight:'700', flexShrink:'0'}}, [`P${pi+1}`]));
                          const pInp = el('input', {type:'text', value:p.name||'', title:`Click to edit Player ${pi+1} name`,
                              style:{flex:'1', padding:'4px 8px', fontSize:'0.8rem', background:'rgba(0,0,0,0.2)', border:'1px solid rgba(255,255,255,0.06)', borderRadius:'5px', color:'var(--text-secondary)', transition:'border 0.2s'}});
                          pInp.addEventListener('focus', ()=>pInp.style.borderColor='var(--accent-primary)');
                          pInp.addEventListener('blur', ()=>{
                              pInp.style.borderColor='rgba(255,255,255,0.06)';
                              const val = pInp.value.trim();
                              if (val !== (p.name||'').trim()) {
                                  p.name = val;
                                  persistTeamRename(tm.id, undefined, [...players]);
                                  Toast.show(`✏️ Player ${pi+1} updated`);
                              }
                          });
                          pWrap.appendChild(pInp);
                          pRow.appendChild(pWrap);
                      });
                      row.appendChild(pRow);
                  }
              } else {
                  /* ── READ-ONLY mode (umpire / spectator) ── */
                  const nameRow = el('div', {style:{display:'flex', alignItems:'center', gap:'9px'}});
                  const badge = el('span', {style:{minWidth:'24px', height:'24px', borderRadius:'50%', background:color+'20', color, fontSize:'0.72rem', fontWeight:'900', display:'flex', alignItems:'center', justifyContent:'center', border:`1px solid ${color}40`, flexShrink:'0'}}, [String(idx+1)]);
                  nameRow.appendChild(badge);
                  nameRow.appendChild(el('span', {style:{fontWeight:'700', fontSize:'0.95rem', color:'var(--text-primary)'}}, [escapeHTML(tm.name)]));
                  row.appendChild(nameRow);

                  const players = (tm.players||[]).filter(p=>p?.name?.trim());
                  if (players.length) {
                      const pRow = el('div', {style:{display:'flex', gap:'16px', paddingLeft:'33px', flexWrap:'wrap'}});
                      players.forEach((p,pi)=>{
                          const pTag = el('div', {style:{display:'flex', alignItems:'center', gap:'5px'}});
                          pTag.appendChild(el('span', {style:{fontSize:'0.65rem', background:'rgba(255,255,255,0.07)', color:'var(--text-muted)', padding:'1px 6px', borderRadius:'3px', fontWeight:'700'}}, [`P${pi+1}`]));
                          pTag.appendChild(el('span', {style:{fontSize:'0.82rem', color:'var(--text-secondary)', fontWeight:'500'}}, [escapeHTML(p.name.trim())]));
                          pRow.appendChild(pTag);
                      });
                      row.appendChild(pRow);
                  }
              }
              card.appendChild(row);
          });
          outerGrid.appendChild(card);
      };

      groupOrder.forEach((gId,idx) => renderGroup(gId, buckets[gId]||[], idx));
      if (noGroup.length) renderGroup(null, noGroup, groupOrder.length);

      wrap.appendChild(outerGrid);

      /* ── Live search ──────────────────────────────────────────── */
      searchInp.addEventListener('input', () => {
          const q = searchInp.value.trim().toLowerCase();
          wrap.querySelectorAll('.team-row').forEach(r => { r.style.display=(!q||r.textContent.toLowerCase().includes(q))?'':'none'; });
          wrap.querySelectorAll('.card').forEach(c => { c.style.display=[...c.querySelectorAll('.team-row')].some(r=>r.style.display!=='none')?'':'none'; });
      });

      return wrap;
  },

  /* ═══════════════════════════════════════════════════════════════
     PLAYER STATS TAB  — all players, match history, win rates
  ═══════════════════════════════════════════════════════════════ */
  _renderPlayerStats(t) {
      const wrap = el('div', {className:'w-full'});

      /* Gather all completed matches */
      const allMatches = [];
      if (t.groups) t.groups.forEach(g=>g.matches.forEach(m=>{ if(m.status==='completed') allMatches.push(m); }));
      if (t.koMatches) t.koMatches.forEach(r=>r.forEach(m=>{ if(m.status==='completed'&&!m.isBye) allMatches.push(m); }));

      /* Build player → team map and stats */
      const playerStats = {}; // playerId → {name, teamName, groupId, matchesPlayed, matchesWon}
      t.teams.forEach(tm => {
          const gId = tm.groupId || (t.groups?.find(g=>g.teams?.find(x=>x.id===tm.id))?.id) || '—';
          (tm.players||[]).forEach(p => {
              if (!p?.name?.trim()) return;
              playerStats[p.id] = { id:p.id, name:p.name.trim(), teamId:tm.id, teamName:tm.name, groupId:gId, matchesPlayed:0, matchesWon:0, ptsFor:0, ptsAgst:0 };
          });
      });

      /* Attribute team match results + points to players */
      allMatches.forEach(m => {
          const teamA = t.teams.find(tm=>tm.id===m.teamAId);
          const teamB = t.teams.find(tm=>tm.id===m.teamBId);
          const wonA  = m.winnerId === m.teamAId;
          const wonB  = m.winnerId === m.teamBId;
          // Derive game scores from fullState if available, else use match scoreA/scoreB
          let ptsA = 0, ptsB = 0;
          if (m.fullState && m.fullState.games) {
              m.fullState.games.forEach(g => { ptsA += g.scoreA||0; ptsB += g.scoreB||0; });
          } else {
              // scoreA/scoreB on the match object are game counts (e.g. 2-0), not points
              // Use a rough heuristic: winning team gets 21 per game won
              ptsA = (m.scoreA||0) * 21; ptsB = (m.scoreB||0) * 21;
          }
          [teamA, teamB].forEach((tm, side) => {
              if (!tm) return;
              const won = side===0 ? wonA : wonB;
              const ptsFor  = side===0 ? ptsA : ptsB;
              const ptsAgst = side===0 ? ptsB : ptsA;
              (tm.players||[]).forEach(p => {
                  if (playerStats[p.id]) {
                      playerStats[p.id].matchesPlayed++;
                      if (won) playerStats[p.id].matchesWon++;
                      playerStats[p.id].ptsFor  = (playerStats[p.id].ptsFor||0)  + ptsFor;
                      playerStats[p.id].ptsAgst = (playerStats[p.id].ptsAgst||0) + ptsAgst;
                  }
              });
          });
      });

      const players = Object.values(playerStats).sort((a,b)=>{
          const ar = a.matchesPlayed ? a.matchesWon/a.matchesPlayed : 0;
          const br = b.matchesPlayed ? b.matchesWon/b.matchesPlayed : 0;
          if (br!==ar) return br-ar;
          if (b.matchesWon !== a.matchesWon) return b.matchesWon - a.matchesWon;
          const netA = (a.ptsFor||0)-(a.ptsAgst||0);
          const netB = (b.ptsFor||0)-(b.ptsAgst||0);
          return netB - netA;
      });

      /* Top bar */
      const topBar = el('div', {className:'stats-top-bar flex justify-between items-center mb-md flex-wrap gap-sm'});
      const totalPlayed = allMatches.length;

      const chip = (icon, val, lbl) => {
          const c = el('div', {style:{display:'flex',alignItems:'center',gap:'6px',background:'rgba(255,255,255,0.06)',padding:'6px 12px',borderRadius:'var(--radius-sm)',border:'1px solid var(--border-color)'}});
          c.innerHTML=`<span style="font-size:1.1rem">${icon}</span><span style="font-weight:800;color:var(--text-primary)">${val}</span><span style="font-size:0.75rem;color:var(--text-muted);font-weight:600">${lbl}</span>`;
          return c;
      };
      const sr = el('div', {className:'stats-chips-row', style:{display:'flex',gap:'8px',flexWrap:'wrap'}});
      sr.appendChild(chip('👤', players.length, 'Players'));
      sr.appendChild(chip('🎯', totalPlayed, 'Matches Done'));
      sr.appendChild(chip('🏆', players.filter(p=>p.matchesWon>0).length, 'Players with Wins'));
      sr.appendChild(chip('📊', players.length > 0 ? players.filter(p=>p.matchesPlayed>0).length : 0, 'Active'));
      topBar.appendChild(sr);

      /* Search + filter */
      const rightBar = el('div', {style:{display:'flex',gap:'8px',flexWrap:'wrap'}});
      const psSearch = el('input', {type:'text', placeholder:'🔍 Search player or team…', style:{width:'200px',fontSize:'0.85rem',padding:'8px 12px'}});
      const grpFilter = el('select', {style:{fontSize:'0.85rem',padding:'8px 12px',width:'140px'}});
      grpFilter.appendChild(el('option',{value:''},'All Groups'));
      (t.groups||[]).forEach(g=>grpFilter.appendChild(el('option',{value:g.id},[`Group ${g.id}`])));
      rightBar.appendChild(grpFilter); rightBar.appendChild(psSearch);
      topBar.appendChild(rightBar);
      wrap.appendChild(topBar);

      /* ── Summary podium if matches played ─────────────────── */
      if (totalPlayed > 0 && players.filter(p=>p.matchesPlayed>0).length >= 3) {
          const podiumCard = el('div', {className:'card mb-md', style:{padding:'20px'}});
          podiumCard.appendChild(el('div', {className:'settings-section-title mb-md'}, ['🏅 Top Performers']));
          const podium = el('div', {style:{display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:'12px'}});
          const medals = ['🥇','🥈','🥉'];
          const podiumColors = ['#ffd700','#c0c0c0','#cd7f32'];
          players.filter(p=>p.matchesPlayed>0).slice(0,3).forEach((p,i)=>{
              const pc = el('div', {style:{textAlign:'center',padding:'16px 8px',background:`${podiumColors[i]}10`,borderRadius:'var(--radius-md)',border:`1px solid ${podiumColors[i]}40`}});
              pc.appendChild(el('div',{style:{fontSize:'2rem',marginBottom:'4px'}},[medals[i]]));
              pc.appendChild(el('div',{style:{fontWeight:'800',fontSize:'0.9rem',color:'var(--text-primary)',lineHeight:'1.3',marginBottom:'4px'}},[escapeHTML(p.name)]));
              pc.appendChild(el('div',{style:{fontSize:'0.75rem',color:'var(--text-muted)',marginBottom:'6px'}},[escapeHTML(p.teamName)]));
              const wr = Math.round((p.matchesWon/p.matchesPlayed)*100);
              pc.appendChild(el('div',{style:{fontWeight:'900',fontSize:'1.3rem',color:podiumColors[i]}},[`${wr}%`]));
              pc.appendChild(el('div',{style:{fontSize:'0.7rem',color:'var(--text-muted)',fontWeight:'600'}},[`${p.matchesWon}W / ${p.matchesPlayed-p.matchesWon}L`]));
              podium.appendChild(pc);
          });
          podiumCard.appendChild(podium);
          wrap.appendChild(podiumCard);
      }

      /* ── Full player table ────────────────────────────────── */
      const tableCard = el('div', {className:'card', style:{padding:'0', overflow:'hidden'}});
      const tableWrap = el('div', {style:{overflowX:'auto'}});
      const table = el('table', {className:'groups-table', style:{width:'100%',minWidth:'560px'}});

      /* Header */
      table.appendChild(el('thead',{},[el('tr',{},[
          el('th',{style:{width:'4%',textAlign:'center'}},'#'),
          el('th',{style:{width:'18%'}},'Player'),
          el('th',{style:{width:'18%'}},'Team'),
          el('th',{className:'ps-col-grp', style:{width:'6%',textAlign:'center'}},'Grp'),
          el('th',{style:{width:'8%',textAlign:'center'}},'MP'),
          el('th',{style:{width:'7%',textAlign:'center'}},'Won'),
          el('th',{className:'ps-col-lost', style:{width:'7%',textAlign:'center'}},'Lost'),
          el('th',{style:{width:'11%',textAlign:'center'}},'Win %'),
          el('th',{className:'ps-col-lost', style:{width:'9%',textAlign:'center'}},'Pts For'),
          el('th',{className:'ps-col-lost', style:{width:'9%',textAlign:'center'}},'Pts Vs'),
          el('th',{className:'ps-col-lost', style:{width:'9%',textAlign:'center'}},'Net Pts'),
      ])]));

      const tbody = el('tbody');
      table.appendChild(tbody);
      tableWrap.appendChild(table);
      tableCard.appendChild(tableWrap);
      wrap.appendChild(tableCard);

      const GRP_COLORS = ['#4fc3f7','#ffa726','#66bb6a','#ef5350','#ab47bc','#26c6da','#d4e157','#ff7043'];
      const groupColorMap = {};
      (t.groups||[]).forEach((g,i) => { groupColorMap[g.id] = GRP_COLORS[i%GRP_COLORS.length]; });

      const renderRows = () => {
          tbody.innerHTML = '';
          const q = psSearch.value.trim().toLowerCase();
          const gf = grpFilter.value;
          let rank = 0;
          players.forEach(p => {
              if (q && !p.name.toLowerCase().includes(q) && !p.teamName.toLowerCase().includes(q)) return;
              if (gf && p.groupId !== gf) return;
              rank++;
              const wr = p.matchesPlayed ? Math.round((p.matchesWon/p.matchesPlayed)*100) : 0;
              const lost = p.matchesPlayed - p.matchesWon;
              const gc = groupColorMap[p.groupId] || 'var(--text-muted)';
              const wrColor = wr>=70?'var(--accent-success)':wr>=40?'var(--accent-warning)':'var(--accent-danger)';
              const bar = `<div style="width:100%;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;margin-top:3px"><div style="width:${wr}%;height:4px;background:${wrColor};border-radius:2px;transition:width 0.4s"></div></div>`;
              const tr = el('tr', {className:'ps-row'});
              const netPts = (p.ptsFor||0) - (p.ptsAgst||0);
              const netColor = netPts>0?'var(--accent-success)':netPts<0?'var(--accent-danger)':'var(--text-muted)';
              tr.innerHTML = `
                  <td style="text-align:center;color:var(--text-muted);font-weight:700;font-size:0.85rem">${rank}</td>
                  <td style="font-weight:700;color:var(--text-primary)">${escapeHTML(p.name)}</td>
                  <td style="color:var(--text-secondary);font-size:0.88rem">${escapeHTML(p.teamName)}</td>
                  <td class="ps-col-grp" style="text-align:center"><span style="background:${gc}20;color:${gc};padding:2px 8px;border-radius:10px;font-size:0.75rem;font-weight:800">${p.groupId}</span></td>
                  <td style="text-align:center;font-weight:700">${p.matchesPlayed}</td>
                  <td style="text-align:center;font-weight:700;color:var(--accent-success)">${p.matchesWon}</td>
                  <td class="ps-col-lost" style="text-align:center;font-weight:700;color:var(--accent-danger)">${lost}</td>
                  <td style="text-align:center"><span style="font-weight:900;color:${wrColor}">${p.matchesPlayed?wr+'%':'—'}</span>${p.matchesPlayed?bar:''}</td>
                  <td class="ps-col-lost" style="text-align:center;font-weight:600;color:var(--text-secondary)">${p.ptsFor||0}</td>
                  <td class="ps-col-lost" style="text-align:center;font-weight:600;color:var(--text-secondary)">${p.ptsAgst||0}</td>
                  <td class="ps-col-lost" style="text-align:center;font-weight:800;color:${netColor}">${netPts>0?'+'+netPts:netPts}</td>
              `;
              tbody.appendChild(tr);
          });
          if (rank===0) {
              const tr = el('tr');
              const emptyTd = el('td', {colSpan:'8', style:{textAlign:'center',padding:'32px',color:'var(--text-muted)',fontStyle:'italic'}}, [
                  totalPlayed===0 ? 'No matches completed yet — stats will appear here as matches are played.' : 'No players match your search.'
              ]);
              tr.appendChild(emptyTd);
              tbody.appendChild(tr);
          }
      };
      renderRows();
      psSearch.addEventListener('input', renderRows);
      grpFilter.addEventListener('change', renderRows);

      return wrap;
  },

  /* ═══════════════════════════════════════════════════════════════
     LIVE FIXTURES TAB — Fan spectator view
     ALL matches shown, with search + status filter + court filter.
     Active match expands into the full stadium card.
  ═══════════════════════════════════════════════════════════════ */
  _renderLiveFixtures(t) {
      const wrap = el('div', { className: 'w-full' });

      // Collect all matches, sorted: live first → pending → completed
      let allMatches = [];
      if (t.groups) t.groups.forEach(g => g.matches.forEach(m => allMatches.push(m)));
      if (t.koMatches) t.koMatches.forEach(r => r.forEach(m => { if (!m.isBye) allMatches.push(m); }));

      if (allMatches.length === 0) {
          const empty = el('div', {className:'card', style:{textAlign:'center',padding:'48px 24px',marginTop:'8px'}});
          empty.innerHTML = `<div style="font-size:3rem;margin-bottom:16px">🏸</div><div style="font-weight:700;font-size:1.1rem;color:var(--text-secondary)">No matches scheduled yet</div><div style="color:var(--text-muted);margin-top:8px;font-size:0.9rem">Check back soon!</div>`;
          wrap.appendChild(empty);
          return wrap;
      }

      // ── Stats bar ────────────────────────────────
      const liveCount    = allMatches.filter(m => m.status === 'live').length;
      const pendingCount = allMatches.filter(m => m.status === 'pending').length;
      const doneCount    = allMatches.filter(m => m.status === 'completed').length;
      const courts       = [...new Set(allMatches.map(m=>m.court).filter(Boolean))].sort((a,b)=>Number(a)-Number(b));

      const statsBar = el('div', {style:{display:'flex', gap:'8px', flexWrap:'wrap', marginBottom:'16px', alignItems:'center'}});
      const mkChip = (icon, val, label, color) => {
          const c = el('div', {style:{display:'flex',alignItems:'center',gap:'5px',background:`${color}15`,border:`1px solid ${color}40`,padding:'5px 12px',borderRadius:'20px',fontSize:'0.78rem',fontWeight:'700',color}});
          c.innerHTML = `${icon} <span style="font-size:1rem;font-weight:900">${val}</span> <span style="opacity:0.7;font-weight:500">${label}</span>`;
          return c;
      };
      if (liveCount)    statsBar.appendChild(mkChip('🔴', liveCount, 'Live', '#ef5350'));
      statsBar.appendChild(mkChip('⏳', pendingCount, 'Upcoming', '#ffca28'));
      statsBar.appendChild(mkChip('✅', doneCount, 'Completed', '#66bb6a'));
      statsBar.appendChild(mkChip('🏸', allMatches.length, 'Total', '#4fc3f7'));
      wrap.appendChild(statsBar);

      // ── Search + Filter bar ──────────────────────
      const filterBar = el('div', {style:{display:'flex', gap:'8px', flexWrap:'wrap', marginBottom:'16px'}});

      const searchInp = el('input', {type:'text', placeholder:'🔍  Search team name…',
          style:{flex:'1', minWidth:'160px', padding:'8px 12px', fontSize:'0.85rem',
                 background:'var(--bg-card)', border:'1px solid var(--border-color)',
                 borderRadius:'var(--radius-sm)', color:'var(--text-primary)'}});

      const statusSel = el('select', {style:{padding:'8px 12px', fontSize:'0.85rem',
          background:'var(--bg-card)', border:'1px solid var(--border-color)',
          borderRadius:'var(--radius-sm)', color:'var(--text-primary)', minWidth:'130px'}});
      [['', 'All Status'], ['live','🔴 Live'], ['pending','⏳ Upcoming'], ['completed','✅ Completed']]
          .forEach(([v,l]) => statusSel.appendChild(el('option',{value:v},[l])));

      const courtSel = el('select', {style:{padding:'8px 12px', fontSize:'0.85rem',
          background:'var(--bg-card)', border:'1px solid var(--border-color)',
          borderRadius:'var(--radius-sm)', color:'var(--text-primary)', minWidth:'120px'}});
      courtSel.appendChild(el('option',{value:''},['All Courts']));
      courts.forEach(c => courtSel.appendChild(el('option',{value:c},[`Court ${c}`])));

      const groupSel = el('select', {style:{padding:'8px 12px', fontSize:'0.85rem',
          background:'var(--bg-card)', border:'1px solid var(--border-color)',
          borderRadius:'var(--radius-sm)', color:'var(--text-primary)', minWidth:'120px'}});
      groupSel.appendChild(el('option',{value:''},['All Groups']));
      (t.groups||[]).forEach(g => groupSel.appendChild(el('option',{value:g.id},[`Group ${g.id}`])));

      filterBar.appendChild(searchInp);
      filterBar.appendChild(statusSel);
      if (courts.length > 1) filterBar.appendChild(courtSel);
      if (t.groups?.length > 1) filterBar.appendChild(groupSel);
      wrap.appendChild(filterBar);

      // ── Active match stadium card (top) ──────────
      const stadiumWrap = el('div', {style:{marginBottom:'20px'}});
      wrap.appendChild(stadiumWrap);

      // ── Match list ───────────────────────────────
      const listWrap = el('div', {style:{display:'flex', flexDirection:'column', gap:'8px'}});
      wrap.appendChild(listWrap);

      // Sorted order: live → pending → completed
      const sorted = [
          ...allMatches.filter(m=>m.status==='live'),
          ...allMatches.filter(m=>m.status==='pending').sort((a,b)=>(a.matchNum||0)-(b.matchNum||0)),
          ...allMatches.filter(m=>m.status==='completed').sort((a,b)=>(b.matchNum||0)-(a.matchNum||0)),
      ];

      // Init active match
      if (!this._fixtureSubTab || !sorted.find(m=>m.id===this._fixtureSubTab)) {
          const firstLive = sorted.find(m=>m.status==='live');
          this._fixtureSubTab = (firstLive || sorted[0])?.id;
      }

      const renderList = () => {
          const q    = searchInp.value.trim().toLowerCase();
          const sf   = statusSel.value;
          const cf   = courtSel.value;
          const gf   = groupSel.value;

          listWrap.innerHTML = '';
          stadiumWrap.innerHTML = '';

          const filtered = sorted.filter(m => {
              const tA = t.teams.find(tm=>tm.id===m.teamAId)?.name || m.labelA || '';
              const tB = t.teams.find(tm=>tm.id===m.teamBId)?.name || m.labelB || '';
              if (q && !tA.toLowerCase().includes(q) && !tB.toLowerCase().includes(q) && !String(m.matchNum).includes(q)) return false;
              if (sf && m.status !== sf) return false;
              if (cf && m.court !== cf) return false;
              if (gf && m.groupId !== gf && !(m.stage||'').includes(`Group ${gf}`)) return false;
              return true;
          });

          if (filtered.length === 0) {
              const empty = el('div', {style:{textAlign:'center',padding:'32px',color:'var(--text-muted)',fontStyle:'italic',background:'var(--bg-card)',borderRadius:'var(--radius-md)'}});
              empty.textContent = 'No matches match your search/filter.';
              listWrap.appendChild(empty);
              return;
          }

          // Ensure activeTab is in filtered results
          if (!filtered.find(m=>m.id===this._fixtureSubTab)) {
              this._fixtureSubTab = filtered[0].id;
          }

          // Stadium card for active match
          const activeM = filtered.find(m=>m.id===this._fixtureSubTab) || filtered[0];
          if (activeM) {
              const card = this._renderMatchStadiumCard(t, activeM);
              card.id = `stadium-card-${activeM.id}`;
              stadiumWrap.appendChild(card);
          }

          // Match rows
          filtered.forEach(m => {
              const isLive = m.status === 'live';
              const isDone = m.status === 'completed';
              const isActive = m.id === this._fixtureSubTab;
              const tA = t.teams.find(tm=>tm.id===m.teamAId);
              const tB = t.teams.find(tm=>tm.id===m.teamBId);
              const nameA = tA?.name || m.labelA || 'TBD';
              const nameB = tB?.name || m.labelB || 'TBD';

              const row = el('div', {
                  style:{
                      display:'grid',
                      gridTemplateColumns:'52px 1fr auto 1fr 90px',
                      alignItems:'center', gap:'10px',
                      padding:'10px 14px',
                      borderRadius:'var(--radius-sm)',
                      cursor:'pointer',
                      border: isActive ? '2px solid var(--accent-primary)' : '1px solid var(--border-color)',
                      background: isActive ? 'rgba(79,195,247,0.08)' : isLive ? 'rgba(239,83,80,0.05)' : 'var(--bg-card)',
                      transition:'all 0.15s',
                  },
                  onClick: () => { this._fixtureSubTab = m.id; renderList(); }
              });

              // Status badge
              const badge = el('div', {style:{textAlign:'center'}});
              if (isLive) {
                  badge.innerHTML = `<span style="display:inline-flex;align-items:center;gap:4px;background:rgba(239,83,80,0.15);border:1px solid rgba(239,83,80,0.5);border-radius:12px;padding:2px 8px;font-size:0.65rem;font-weight:900;color:#ef5350;letter-spacing:0.06em"><span style="width:6px;height:6px;border-radius:50%;background:#ef5350;display:inline-block;animation:pulseGlow 1.2s infinite"></span>LIVE</span>`;
              } else if (isDone) {
                  badge.innerHTML = `<span style="font-size:0.68rem;font-weight:800;color:var(--accent-success)">✓ DONE</span>`;
              } else {
                  badge.innerHTML = `<span style="font-size:0.68rem;font-weight:700;color:var(--text-muted)">M${m.matchNum}</span>`;
              }
              row.appendChild(badge);

              // Team A
              const tADiv = el('div', {style:{textAlign:'right'}});
              tADiv.appendChild(el('div', {style:{fontWeight:'700',fontSize:'0.9rem',color: m.winnerId===m.teamAId?'var(--accent-success)':'var(--text-primary)',lineHeight:'1.2'}}, [nameA]));
              if (tA?.players?.length) {
                  const p = tA.players.filter(p=>p?.name?.trim()).map(p=>p.name.trim()).join(' · ');
                  tADiv.appendChild(el('div', {style:{fontSize:'0.68rem',color:'var(--text-muted)',marginTop:'2px'}}, [p]));
              }
              row.appendChild(tADiv);

              // Score / vs center
              const scoreDiv = el('div', {style:{textAlign:'center',fontFamily:"'Roboto Mono',monospace",fontWeight:'900',fontSize:'1rem',color:'var(--text-secondary)',minWidth:'60px'}});
              if (isDone) {
                  scoreDiv.innerHTML = `<span style="color:#4fc3f7">${m.scoreA||0}</span> <span style="color:rgba(255,255,255,0.3);font-size:0.75rem">—</span> <span style="color:#ef5350">${m.scoreB||0}</span>`;
              } else if (isLive) {
                  // Show live point score from cache if available
                  const lsCache = window.TournamentHub?._liveStateCache?.[m.id];
                  let rowPtA = m.scoreA||0, rowPtB = m.scoreB||0;
                  if (lsCache && lsCache.games) {
                      const lg = lsCache.games[lsCache.currentGame];
                      if (lg) { rowPtA = lg.scoreA; rowPtB = lg.scoreB; }
                  } else if (window.AppState?.current && window.AppState?.activeMatchId === m.id && window.AppState.current.games) {
                      const lg = window.AppState.current.games[window.AppState.current.currentGame];
                      if (lg) { rowPtA = lg.scoreA; rowPtB = lg.scoreB; }
                  }
                  scoreDiv.innerHTML = `<span style="color:#4fc3f7;font-size:1.2rem">${rowPtA}</span><span style="color:#ef5350;font-size:0.55rem;display:block;letter-spacing:0.05em;animation:pulseGlow 1.2s infinite">●LIVE</span><span style="color:#ef5350;font-size:1.2rem">${rowPtB}</span>`;
              } else {
                  const info = el('div', {style:{display:'flex',flexDirection:'column',alignItems:'center',gap:'2px'}});
                  info.appendChild(el('span', {style:{fontSize:'0.8rem',opacity:'0.4'}}, ['VS']));
                  if (m.court) info.appendChild(el('span', {style:{fontSize:'0.63rem',color:'var(--accent-warning)',fontWeight:'700',background:'rgba(255,202,40,0.1)',padding:'1px 5px',borderRadius:'4px'}}, [`C${m.court}`]));
                  scoreDiv.appendChild(info);
              }
              row.appendChild(scoreDiv);

              // Team B
              const tBDiv = el('div', {style:{textAlign:'left'}});
              tBDiv.appendChild(el('div', {style:{fontWeight:'700',fontSize:'0.9rem',color: m.winnerId===m.teamBId?'var(--accent-success)':'var(--text-primary)',lineHeight:'1.2'}}, [nameB]));
              if (tB?.players?.length) {
                  const p = tB.players.filter(p=>p?.name?.trim()).map(p=>p.name.trim()).join(' · ');
                  tBDiv.appendChild(el('div', {style:{fontSize:'0.68rem',color:'var(--text-muted)',marginTop:'2px'}}, [p]));
              }
              row.appendChild(tBDiv);

              // Right meta: stage + time
              const metaDiv = el('div', {style:{textAlign:'right'}});
              if (m.stage) metaDiv.appendChild(el('div', {style:{fontSize:'0.62rem',color:'var(--accent-primary)',fontWeight:'700',textTransform:'uppercase',letterSpacing:'0.04em',lineHeight:'1.3'}}, [m.stage]));
              if (m.scheduledTime) metaDiv.appendChild(el('div', {style:{fontSize:'0.65rem',color:'var(--text-muted)',marginTop:'2px'}}, [m.scheduledTime]));
              if (isLive) {
                  const wBtn = el('button', {
                      className:'btn btn-danger btn-sm',
                      style:{fontSize:'0.65rem',padding:'3px 8px',minHeight:'auto',marginTop:'4px',display:'block',width:'100%'},
                      onClick: (e) => { e.stopPropagation(); DisplayManager.launchScoreboard(m.id); }
                  }, ['📺 Watch']);
                  metaDiv.appendChild(wBtn);
              }
              row.appendChild(metaDiv);

              listWrap.appendChild(row);
          });

          // Result count
          if (filtered.length < sorted.length) {
              const cnt = el('div', {style:{textAlign:'center',padding:'8px',color:'var(--text-muted)',fontSize:'0.78rem'}});
              cnt.textContent = `Showing ${filtered.length} of ${sorted.length} matches`;
              listWrap.appendChild(cnt);
          }
      };

      renderList();
      searchInp.addEventListener('input', renderList);
      statusSel.addEventListener('change', renderList);
      courtSel.addEventListener('change', renderList);
      groupSel.addEventListener('change', renderList);

      // ── LIVE SCORE SYNC ─────────────────────────────────────────────────
      // When the selected match is live, subscribe to match_details for real-time
      // point scores. Unsubscribe whenever selection changes or tab changes.
      if (!window.TournamentHub._liveStateCache) window.TournamentHub._liveStateCache = {};
      if (!window.TournamentHub._liveSyncUnsub) window.TournamentHub._liveSyncUnsub = {};

      const subscribeToLiveMatch = (matchId) => {
          // Unsubscribe any existing subscription for other matches
          Object.keys(window.TournamentHub._liveSyncUnsub).forEach(oldId => {
              if (oldId !== matchId && typeof window.TournamentHub._liveSyncUnsub[oldId] === 'function') {
                  window.TournamentHub._liveSyncUnsub[oldId]();
                  delete window.TournamentHub._liveSyncUnsub[oldId];
              }
          });

          if (!matchId) return;
          // Already subscribed to this match
          if (window.TournamentHub._liveSyncUnsub[matchId]) return;

          if (window.FBM && window.FBM.user && window.FBM.db) {
              // Firebase: real-time listener on match_details
              window.TournamentHub._liveSyncUnsub[matchId] = window.FBM.startBoardSync(matchId, (state) => {
                  if (!state) return;
                  window.TournamentHub._liveStateCache[matchId] = state;
                  // Re-render only the stadium card in-place without full Router re-render
                  const stadiumEl = document.getElementById(`stadium-card-${matchId}`);
                  if (stadiumEl) {
                      const fresh = window.TournamentHub._renderMatchStadiumCard(t, allMatches.find(mx=>mx.id===matchId)||allMatches[0]);
                      fresh.id = `stadium-card-${matchId}`;
                      stadiumEl.replaceWith(fresh);
                  }
              });
          } else {
              // LocalStorage mode: poll AppState every 800ms for same-window scoring
              if (window.TournamentHub._livePollerInterval) clearInterval(window.TournamentHub._livePollerInterval);
              window.TournamentHub._livePollerInterval = setInterval(() => {
                  const state = window.AppState?.current;
                  if (state && window.AppState?.activeMatchId === matchId) {
                      const cached = window.TournamentHub._liveStateCache[matchId];
                      const curGame = state.games?.[state.currentGame];
                      const cachedGame = cached?.games?.[cached?.currentGame];
                      // Only re-render if score actually changed
                      if (!cached || curGame?.scoreA !== cachedGame?.scoreA || curGame?.scoreB !== cachedGame?.scoreB || state.gamesWon?.A !== cached?.gamesWon?.A) {
                          window.TournamentHub._liveStateCache[matchId] = state;
                          const stadiumEl = document.getElementById(`stadium-card-${matchId}`);
                          if (stadiumEl) {
                              const fresh = window.TournamentHub._renderMatchStadiumCard(t, allMatches.find(mx=>mx.id===matchId)||allMatches[0]);
                              fresh.id = `stadium-card-${matchId}`;
                              stadiumEl.replaceWith(fresh);
                          }
                      }
                  }
              }, 800);
              window.TournamentHub._liveSyncUnsub[matchId] = () => {
                  clearInterval(window.TournamentHub._livePollerInterval);
                  delete window.TournamentHub._livePollerInterval;
              };
          }
      };

      // Start syncing for the current active match if it's live
      const startActiveSync = () => {
          const activeM = sorted.find(m => m.id === this._fixtureSubTab);
          if (activeM && activeM.status === 'live') {
              subscribeToLiveMatch(activeM.id);
          } else {
              // Not live — clear all subscriptions
              Object.values(window.TournamentHub._liveSyncUnsub).forEach(unsub => { if (typeof unsub === 'function') unsub(); });
              window.TournamentHub._liveSyncUnsub = {};
              if (window.TournamentHub._livePollerInterval) {
                  clearInterval(window.TournamentHub._livePollerInterval);
                  delete window.TournamentHub._livePollerInterval;
              }
          }
      };

      startActiveSync();

      return wrap;
  },

  /* Renders a stadium-display-style card for a single match for spectators */
  _renderMatchStadiumCard(t, m) {
      const teamA = t.teams.find(tm => tm.id === m.teamAId);
      const teamB = t.teams.find(tm => tm.id === m.teamBId);
      const nameA = teamA ? teamA.name : (m.labelA || 'TBD');
      const nameB = teamB ? teamB.name : (m.labelB || 'TBD');
      const playersA = (teamA?.players || []).filter(p => p?.name?.trim()).map(p => p.name.trim());
      const playersB = (teamB?.players || []).filter(p => p?.name?.trim()).map(p => p.name.trim());
      const isLive = m.status === 'live';
      const isDone = m.status === 'completed';

      const outer = el('div', {style:{borderRadius:'var(--radius-xl)', overflow:'hidden', border: isLive ? '2px solid rgba(239,83,80,0.5)' : '1px solid var(--border-color)', boxShadow: isLive ? '0 0 40px rgba(239,83,80,0.12)' : 'var(--shadow-md)'}});

      // ── TOP INFO BAR ─────────────────────────────
      const infoBar = el('div', {style:{
          background:'#0a0a0f', padding:'10px 20px', display:'flex',
          justifyContent:'space-between', alignItems:'center', flexWrap:'wrap', gap:'8px'
      }});
      const leftInfo = el('div', {style:{display:'flex', alignItems:'center', gap:'12px'}});
      if (isLive) {
          const livePill = el('div', {style:{display:'flex', alignItems:'center', gap:'5px', background:'rgba(239,83,80,0.15)', border:'1px solid rgba(239,83,80,0.4)', borderRadius:'20px', padding:'3px 10px'}});
          livePill.innerHTML = `<span style="width:7px;height:7px;border-radius:50%;background:#ef5350;display:inline-block;animation:pulseGlow 1.2s infinite"></span><span style="font-size:0.75rem;font-weight:900;color:#ef5350;letter-spacing:0.1em">LIVE</span>`;
          leftInfo.appendChild(livePill);
      } else if (isDone) {
          leftInfo.innerHTML = `<span style="font-size:0.8rem;font-weight:800;color:var(--accent-success);letter-spacing:0.05em">✓ COMPLETED</span>`;
      } else {
          const timeStr = m.scheduledTime ? `⏰ ${m.scheduledTime}` : 'UPCOMING';
          leftInfo.innerHTML = `<span style="font-size:0.8rem;font-weight:700;color:var(--text-muted)">${timeStr}</span>`;
      }
      infoBar.appendChild(leftInfo);
      const rightInfo = el('div', {style:{display:'flex', gap:'10px', alignItems:'center'}});
      if (m.stage) rightInfo.appendChild(el('span', {style:{fontSize:'0.75rem', color:'var(--accent-primary)', fontWeight:'700', textTransform:'uppercase', letterSpacing:'0.05em'}}, [m.stage]));
      if (m.court) rightInfo.appendChild(el('div', {style:{background:'rgba(255,202,40,0.15)', border:'1px solid rgba(255,202,40,0.35)', borderRadius:'6px', padding:'2px 10px', fontSize:'0.8rem', fontWeight:'800', color:'var(--accent-warning)'}}, [`🏟 Court ${m.court}`]));
      rightInfo.appendChild(el('span', {style:{color:'var(--text-muted)', fontSize:'0.75rem', fontWeight:'700', fontFamily:"'Roboto Mono',monospace"}}, [`M${m.matchNum}`]));
      infoBar.appendChild(rightInfo);
      outer.appendChild(infoBar);

      // ── STADIUM SCOREBOARD ───────────────────────
      // This mirrors the BadmintonBoard stadium-layout but scaled for inline display
      const board = el('div', {style:{
          display:'grid',
          gridTemplateColumns:'1fr 120px 1fr',
          gridTemplateRows:'auto auto auto',
          background:'#1a3320',
          fontFamily:"'Inter', sans-serif",
          gap:'3px', padding:'3px'
      }});

      // ── LIVE SCORE: read from AppState/Firebase match_details ──────────
      // m.scoreA/scoreB = game wins (0,1,2). For the in-progress current game
      // we need the live point score from match_details.
      let liveState = null;
      if (isLive) {
          // Try AppState first (same window, umpire scoring locally)
          if (window.AppState && window.AppState.current && window.AppState.activeMatchId === m.id) {
              liveState = window.AppState.current;
          }
          // Try the cached live state stored on TournamentHub for this match
          if (!liveState && window.TournamentHub._liveStateCache) {
              liveState = window.TournamentHub._liveStateCache[m.id] || null;
          }
      }

      // Extract point scores from liveState if available
      let ptScoreA = '—', ptScoreB = '—';
      let gameWinsA = m.scoreA || 0, gameWinsB = m.scoreB || 0;
      let currentGameNum = 1, serverSide = null;
      if (liveState && liveState.games) {
          const curGame = liveState.games[liveState.currentGame] || liveState.games[liveState.games.length - 1];
          if (curGame) { ptScoreA = curGame.scoreA; ptScoreB = curGame.scoreB; }
          gameWinsA = liveState.gamesWon?.A || 0;
          gameWinsB = liveState.gamesWon?.B || 0;
          currentGameNum = (liveState.currentGame || 0) + 1;
          serverSide = liveState.serverSide || null;
      }

      // Score values — use live point score for live matches, game wins for done
      const scoreA = isDone ? m.scoreA : (isLive ? ptScoreA : '—');
      const scoreB = isDone ? m.scoreB : (isLive ? ptScoreB : '—');

      // Helper: team panel (header + score)
      const makeTeamPanel = (name, players, scoreVal, side, isWinner) => {
          const panel = el('div', {style:{
              background:'#0a0a0f',
              display:'flex', flexDirection:'column',
              alignItems:'center', justifyContent:'space-between',
              padding:'0',
              borderLeft: isWinner ? '4px solid var(--accent-primary)' : 'none',
              borderRight: isWinner ? '4px solid var(--accent-primary)' : 'none',
          }});

          // Name header
          const hdr = el('div', {style:{
              background: side === 'A' ? 'rgba(26,115,232,0.18)' : 'rgba(234,67,53,0.18)',
              padding:'14px 16px', textAlign:'center', width:'100%',
              borderBottom:'1px solid rgba(255,255,255,0.06)'
          }});
          hdr.appendChild(el('div', {style:{
              fontSize:'clamp(0.9rem, 2vw, 1.3rem)', fontWeight:'900',
              color: isWinner ? 'var(--accent-primary)' : '#fff',
              textTransform:'uppercase', letterSpacing:'0.06em',
              lineHeight:'1.2', fontFamily:"'Rajdhani',sans-serif"
          }}, [name]));
          if (players.length) {
              const pDiv = el('div', {style:{fontSize:'clamp(0.65rem,1.2vw,0.82rem)', color:'rgba(255,255,255,0.55)', marginTop:'5px', fontWeight:'500', lineHeight:'1.4'}});
              pDiv.textContent = players.join(' · ');
              hdr.appendChild(pDiv);
          }
          panel.appendChild(hdr);

          // Big score
          const scoreBox = el('div', {style:{
              flex:'1', display:'flex', alignItems:'center', justifyContent:'center',
              fontSize:'clamp(4rem, 12vw, 9rem)',
              fontFamily:"'Roboto Mono', monospace",
              fontWeight:'900',
              color: isWinner ? 'var(--accent-primary)' : (side === 'A' ? '#4fc3f7' : '#ef5350'),
              padding:'20px 16px',
              textShadow: isWinner ? '0 0 30px rgba(79,195,247,0.4)' : 'none',
              lineHeight:'1',
              position:'relative'
          }});
          scoreBox.textContent = scoreVal !== undefined && scoreVal !== null ? String(scoreVal) : '—';
          if (isWinner) {
              const trophy = el('div', {style:{position:'absolute', top:'8px', right:'12px', fontSize:'1.5rem'}});
              trophy.textContent = '🏆';
              scoreBox.appendChild(trophy);
          }
          panel.appendChild(scoreBox);

          return panel;
      };

      const winA = isDone && m.winnerId === m.teamAId;
      const winB = isDone && m.winnerId === m.teamBId;

      board.appendChild(makeTeamPanel(nameA, playersA, scoreA, 'A', winA));

      // Center column: game wins + status
      const center = el('div', {style:{
          background:'#0a0a0f', display:'flex', flexDirection:'column',
          alignItems:'center', justifyContent:'space-between', gap:'0'
      }});

      // Game-wins row — uses live gameWinsA/B when live
      const gwRow = el('div', {style:{
          display:'flex', gap:'3px', width:'100%', padding:'8px',
          borderBottom:'1px solid rgba(255,255,255,0.06)', flex:'0 0 auto'
      }});
      const gwA = el('div', {style:{flex:1, textAlign:'center', background:'rgba(26,115,232,0.2)', borderRadius:'4px', padding:'8px 4px'}});
      gwA.innerHTML = `<div style="font-family:'Roboto Mono',monospace;font-size:1.6rem;font-weight:900;color:#4fc3f7">${gameWinsA}</div><div style="font-size:0.6rem;color:rgba(255,255,255,0.4);font-weight:700;text-transform:uppercase;margin-top:2px">Games</div>`;
      const gwB = el('div', {style:{flex:1, textAlign:'center', background:'rgba(234,67,53,0.2)', borderRadius:'4px', padding:'8px 4px'}});
      gwB.innerHTML = `<div style="font-family:'Roboto Mono',monospace;font-size:1.6rem;font-weight:900;color:#ef5350">${gameWinsB}</div><div style="font-size:0.6rem;color:rgba(255,255,255,0.4);font-weight:700;text-transform:uppercase;margin-top:2px">Games</div>`;
      gwRow.appendChild(gwA); gwRow.appendChild(gwB);
      center.appendChild(gwRow);

      // Status text + game number + server indicator
      const statusBox = el('div', {style:{
          flex:'1', display:'flex', flexDirection:'column',
          alignItems:'center', justifyContent:'center',
          padding:'12px 4px', textAlign:'center', gap:'6px'
      }});
      const statusText = isLive ? 'IN PLAY' : (isDone ? 'FINAL' : 'UPCOMING');
      const statusColor = isLive ? '#ef5350' : (isDone ? 'var(--accent-success)' : 'var(--text-muted)');
      statusBox.appendChild(el('div', {style:{fontSize:'0.65rem', fontWeight:'900', color:statusColor, letterSpacing:'0.12em', textTransform:'uppercase'}}, [statusText]));
      statusBox.appendChild(el('div', {style:{fontSize:'1.4rem', color:'#fff', fontWeight:'900', fontFamily:"'Roboto Mono',monospace"}}, ['VS']));
      if (isLive) {
          statusBox.appendChild(el('div', {style:{fontSize:'0.6rem', color:'rgba(255,255,255,0.4)', fontWeight:'700', marginTop:'2px'}}, [`Game ${currentGameNum}`]));
          if (serverSide) {
              const srvLabel = serverSide === 'A' ? nameA.split(' ')[0] : nameB.split(' ')[0];
              statusBox.appendChild(el('div', {style:{fontSize:'0.58rem', color:'var(--accent-warning)', fontWeight:'700', marginTop:'2px'}}, [`🏸 Serving: ${srvLabel}`]));
          }
      }
      center.appendChild(statusBox);

      // Live indicator dots for live match
      if (isLive) {
          const liveAnim = el('div', {style:{padding:'8px', borderTop:'1px solid rgba(255,255,255,0.06)', width:'100%', textAlign:'center'}});
          liveAnim.innerHTML = `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#ef5350;animation:pulseGlow 1.2s infinite"></span>`;
          center.appendChild(liveAnim);
      }

      board.appendChild(center);
      board.appendChild(makeTeamPanel(nameB, playersB, scoreB, 'B', winB));

      outer.appendChild(board);

      // ── FOOTER: live scoreboard button or match details ──
      const footer = el('div', {style:{
          background:'#0a0a0f', padding:'12px 20px',
          borderTop:'1px solid rgba(255,255,255,0.06)',
          display:'flex', alignItems:'center', justifyContent:'space-between', gap:'12px', flexWrap:'wrap'
      }});

      // Match info text
      const infoText = el('div', {style:{fontSize:'0.8rem', color:'var(--text-muted)', fontWeight:'500'}});
      if (isDone) {
          const winnerName = winA ? nameA : (winB ? nameB : '');
          infoText.textContent = winnerName ? `🏆 Winner: ${winnerName}` : 'Match Completed';
      } else if (isLive) {
          infoText.textContent = '🔴 Match is currently in progress';
      } else {
          infoText.textContent = m.scheduledTime ? `Scheduled: ${m.scheduledTime}` : 'Match scheduled';
      }
      footer.appendChild(infoText);

      if (isLive) {
          const watchBtn = el('button', {
              className:'btn btn-danger btn-sm',
              style:{fontWeight:'800', letterSpacing:'0.04em', flexShrink:'0'},
              onClick: () => DisplayManager.launchScoreboard(m.id)
          }, ['📺 Open Stadium Display']);
          footer.appendChild(watchBtn);
      }

      outer.appendChild(footer);
      return outer;
  },

  /* ═══════════════════════════════════════════════════════════════
     SETTINGS TAB  — umpire management + permissions + PIN
     Fully rebuilt for clarity and reliable toggle behaviour
  ═══════════════════════════════════════════════════════════════ */
  _renderSettingsTab(t) {
      const wrap = el('div', { className: 'w-full' });
      let perms  = this._getUmpirePermissions();
      let umpires = [];
      try { umpires = JSON.parse(localStorage.getItem('REGISTERED_UMPIRES')||'[]'); } catch(e){}

      /* ── helper: section card ─────────────────────────────── */
      const section = (emoji, title, desc) => {
          const card = el('div', {className:'card', style:{marginBottom:'20px', padding:'24px'}});
          const hdr  = el('div', {className:'settings-section-title'});
          hdr.textContent = `${emoji}  ${title}`;
          card.appendChild(hdr);
          if (desc) card.appendChild(el('div', {className:'text-sm text-secondary mb-md'}, [desc]));
          return card;
      };

      /* ── helper: toggle row ───────────────────────────────── */
      const toggleRow = (label, desc, key, defaultVal) => {
          const current = perms[key] !== undefined ? !!perms[key] : defaultVal;
          const row = el('div', {className:'setting-row', style:{userSelect:'none'}});

          const info = el('div', {style:{flex:1, paddingRight:'16px'}});
          info.appendChild(el('div', {style:{fontWeight:'600', color:'var(--text-primary)', fontSize:'0.9rem'}}, [label]));
          if (desc) info.appendChild(el('div', {className:'text-xs text-muted', style:{marginTop:'2px'}}, [desc]));
          row.appendChild(info);

          /* toggle pill */
          let val = current;
          const pill = el('div', {style:{
              width:'48px', height:'26px', borderRadius:'13px', position:'relative',
              background: val ? 'var(--accent-success)' : 'rgba(255,255,255,0.12)',
              border: '1.5px solid rgba(255,255,255,0.15)',
              cursor:'pointer', flexShrink:'0', transition:'background 0.25s'
          }});
          const knob = el('div', {style:{
              width:'20px', height:'20px', borderRadius:'50%', background:'#fff',
              position:'absolute', top:'2px', left: val?'24px':'2px',
              transition:'left 0.25s', boxShadow:'0 2px 4px rgba(0,0,0,0.35)'
          }});
          pill.appendChild(knob);

          const setVal = (v) => {
              val = v;
              pill.style.background = v ? 'var(--accent-success)' : 'rgba(255,255,255,0.12)';
              knob.style.left = v ? '24px' : '2px';
              perms[key] = v;
              this._saveUmpirePermissions(perms);
              Toast.show(`${label}: ${v ? '✅ Enabled' : '⛔ Disabled'}`);
          };
          pill.addEventListener('click', () => setVal(!val));
          row.appendChild(pill);
          return row;
      };

      /* ═══ 1. UMPIRE ROSTER ═══════════════════════════════════ */
      const umpCard = section('🎙️', 'Umpire Roster', 'Register umpires with a unique ID. They use this ID on the home screen to get their restricted view.');

      /* Add form */
      const addForm = el('div', {style:{display:'flex', gap:'8px', flexWrap:'wrap', marginBottom:'16px'}});
      const idInp   = el('input', {type:'text', placeholder:'Umpire ID  e.g. UMP-01', style:{flex:'1', minWidth:'130px', textTransform:'uppercase'}});
      const nmInp   = el('input', {type:'text', placeholder:'Full Name', style:{flex:'2', minWidth:'160px'}});
      const addUmpBtn = el('button', {className:'btn btn-success btn-sm', style:{whiteSpace:'nowrap'}, onClick:()=>{
          const id   = idInp.value.trim().toUpperCase();
          const name = nmInp.value.trim();
          if (!id||!name) { Toast.show('Enter both ID and name','error'); return; }
          if (umpires.find(u=>u.id===id)) { Toast.show(`ID "${id}" already exists`,'error'); return; }
          umpires.push({id, name, createdAt:Date.now()});
          localStorage.setItem('REGISTERED_UMPIRES', JSON.stringify(umpires));
          // Save to Firebase so umpires can login from any device
          if (window.FBM.user && t && t.id) {
              window.FBM.saveUmpires(t.id, umpires).catch(()=>{});
          }
          idInp.value=''; nmInp.value='';
          Toast.show(`✅ ${name} (${id}) registered`);
          window.Router.render();
      }}, ['+ Register']);
      addForm.appendChild(idInp); addForm.appendChild(nmInp); addForm.appendChild(addUmpBtn);
      umpCard.appendChild(addForm);

      /* Umpire list */
      if (umpires.length) {
          umpires.forEach((u,idx)=>{
              const ur = el('div', {className:'setting-row'});
              const info = el('div', {style:{flex:1,display:'flex',flexDirection:'column',gap:'2px'}});
              info.appendChild(el('span',{style:{fontWeight:'700',color:'var(--text-primary)'}},[u.name]));
              info.appendChild(el('span',{className:'text-xs mono',style:{color:'var(--accent-primary)'}},[`ID: ${u.id}`]));
              ur.appendChild(info);
              const rmBtn = el('button',{className:'btn btn-danger btn-sm',style:{padding:'4px 12px',fontSize:'0.78rem'}, onClick:()=>{
                  umpires.splice(idx,1);
                  localStorage.setItem('REGISTERED_UMPIRES',JSON.stringify(umpires));
                  if (window.FBM.user && t && t.id) {
                      window.FBM.saveUmpires(t.id, umpires).catch(()=>{});
                  }
                  Toast.show(`${u.name} removed`);
                  window.Router.render();
              }},['✕ Remove']);
              ur.appendChild(rmBtn);
              umpCard.appendChild(ur);
          });
      } else {
          umpCard.appendChild(el('div',{style:{textAlign:'center',padding:'20px',color:'var(--text-muted)',fontSize:'0.9rem',fontStyle:'italic',background:'rgba(0,0,0,0.1)',borderRadius:'var(--radius-sm)'}},[
              'No umpires registered yet. Add one above.'
          ]));
      }
      wrap.appendChild(umpCard);

      /* ═══ 2. UMPIRE PERMISSIONS ══════════════════════════════ */
      const permCard = section('👁️', 'Umpire Permissions', 'Control exactly what umpires can see and do. Fixture editing is always Master-only.');

      const permDefs = [
          { key:'canViewTeams',    label:'Teams & Players tab',           desc:'Show team roster and player names',               def:true  },
          { key:'canViewSchedule', label:'Master Schedule tab',           desc:'Show fixture list with court & time',              def:true  },
          { key:'canViewGroups',   label:'Group Stage tab',               desc:'Show standings tables and group match list',       def:true  },
          { key:'canViewBracket',  label:'Knockout Bracket tab',          desc:'Show the elimination bracket',                    def:true  },
          { key:'canViewStats',    label:'Player Stats tab',              desc:'Show match stats and win rates per player',        def:true  },
          { key:'canViewLiveMatch',label:'Open Live Scoreboard',          desc:'Allow umpires to open the stadium display',        def:true  },
          { key:'canStartMatch',   label:'Start & Score Matches',         desc:'Allow umpires to start and score any match',def:true },
      ];
      permDefs.forEach(pd => permCard.appendChild(toggleRow(pd.label, pd.desc, pd.key, pd.def)));
      wrap.appendChild(permCard);

      /* ═══ 3. MASTER PIN ══════════════════════════════════════ */
      const pinCard = section('🔐', 'Master Console PIN', 'Protect the Master Console with a PIN. Umpires and fans cannot access the console without it.');

      const currentPin = localStorage.getItem('MASTER_PIN') || '';
      const pinRow = el('div', {style:{display:'flex',gap:'8px',flexWrap:'wrap',alignItems:'center'}});
      const pinInp = el('input', {type:'password', placeholder:'Enter 4–8 digit PIN (blank = no PIN)', value:currentPin, style:{flex:'1',minWidth:'200px'}});

      const setPinBtn = el('button', {className:'btn btn-warning btn-sm', onClick:()=>{
          const pin = pinInp.value.trim();
          if (pin && (pin.length<4||pin.length>8||!/^\d+$/.test(pin))) { Toast.show('PIN must be 4–8 digits only','error'); return; }
          if (pin) { localStorage.setItem('MASTER_PIN',pin); Toast.show('🔐 Master PIN set'); }
          else { localStorage.removeItem('MASTER_PIN'); Toast.show('PIN cleared — no protection'); pinInp.value=''; }
      }}, ['Save PIN']);

      const clearBtn = el('button', {className:'btn btn-ghost btn-sm', onClick:()=>{
          localStorage.removeItem('MASTER_PIN'); pinInp.value='';
          Toast.show('PIN cleared');
      }}, ['Clear']);

      pinRow.appendChild(pinInp); pinRow.appendChild(setPinBtn); pinRow.appendChild(clearBtn);
      pinCard.appendChild(pinRow);
      pinCard.appendChild(el('div',{className:'text-xs text-muted mt-sm'},['⚠️ Stored in browser localStorage. Clear browser data to reset.']));
      wrap.appendChild(pinCard);

      return wrap;
  },
  _renderSchedule(t, isSpectator) {
      const wrap = el('div', { className: 'w-full' });
      const isMaster = !isSpectator;
      const umpirePerms = this._getUmpirePermissions();
      const canEditFixtures = isMaster; // Only master console can edit fixtures

      // Collect all group names for dropdown
      const groupNames = (t.groups || []).map(g => g.id);
      const koRounds = (t.koMatches || []).map((r, i) => {
          const len = t.koMatches.length;
          if (i === len - 1) return 'Final';
          if (i === len - 2) return 'Semi-Finals';
          return `Round ${i + 1}`;
      });

      let allMatches = [];
      if (t.groups) t.groups.forEach(g => g.matches.forEach(m => allMatches.push({...m, _groupId: g.id})));
      if (t.koMatches) t.koMatches.forEach((r, ri) => r.forEach(m => { if (!m.isBye) allMatches.push({...m, _roundIndex: ri}); }));
      allMatches.sort((a,b) => a.matchNum - b.matchNum);

      if (canEditFixtures) {
          const headerActions = el('div', {className: 'flex justify-between items-center mb-md flex-wrap gap-sm no-print'});
          headerActions.appendChild(el('div', {className: 'text-sm text-secondary font-medium'}, ['Edit teams, court, group & round via dropdowns. Upload CSV to bulk-update fixtures and group stage.']));
          
          const uploadLabel = el('label', { className: 'btn btn-ghost btn-sm', style: { cursor: 'pointer', margin: 0, fontWeight:'bold' } }, [
              Icons.upload, ' Upload CSV Schedule',
              el('input', { type: 'file', accept: '.csv', style: { display: 'none' }, onChange: (e) => this._handleScheduleCSV(e, t) })
          ]);

          const exportGroup = el('div', { className: 'flex gap-sm flex-wrap mt-sm' });
          exportGroup.appendChild(uploadLabel);
          exportGroup.appendChild(el('button', { className: 'btn btn-success btn-sm', onClick: () => this._exportFixturesCSV(t) }, ['⬇️ Export Fixtures CSV']));
          exportGroup.appendChild(el('button', { className: 'btn btn-primary btn-sm', onClick: () => window.print() }, ['🖨️ Print Fixtures (PDF)']));

          headerActions.appendChild(exportGroup);
          wrap.appendChild(headerActions);

          // CSV format hint
          const hint = el('div', {className:'no-print', style:{background:'rgba(79,195,247,0.08)', border:'1px solid rgba(79,195,247,0.25)', borderRadius:'var(--radius-sm)', padding:'10px 14px', marginBottom:'16px', fontSize:'0.8rem', color:'var(--text-secondary)'}});
          hint.innerHTML = `<strong style="color:var(--accent-primary)">CSV Format:</strong> <code>Match No., Group/Round, Team A, Team B, Date &amp; Time, Court No., Status</code><br>Example: <code>1, Group A, Raptors, Eagles, 10:00 AM, 3, Scheduled</code> — Group Stage table updates automatically.`;
          wrap.appendChild(hint);
      }

      if (allMatches.length === 0) {
          wrap.appendChild(el('div', {className: 'text-muted p-lg text-center card'}, ['No matches available.']));
          return wrap;
      }

      const containerCard = el('div', { className: 'card', style: { padding: '24px' } });
